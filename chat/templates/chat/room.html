{% extends "base.html" %}

{% block title %}Chat - {{ display_name }}{% endblock %}

{% block content %}
<div class="flex h-screen bg-gray-100">
    <!-- Main Chat Area - Full width -->
    <div class="flex-1 flex flex-col">
        <!-- Chat Header -->
        <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="{% url 'chat_rooms' %}" class="text-gray-500 hover:text-indigo-600 transition mr-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </a>
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white font-bold">
                    {{ avatar_initial }}
                </div>
                <div>
                    <h2 class="font-semibold text-gray-800">{{ display_name }}</h2>
                    <div class="flex items-center gap-2">
                        <p class="text-xs text-gray-500" id="connectionStatus">Connecting...</p>
                        {% if is_group %}
                        <span class="text-xs text-gray-400">• {{ participants.count }} participants</span>
                        {% endif %}
                    </div>
                </div>
            </div>
            
            {% if is_group %}
            <button id="groupInfoBtn" class="text-gray-500 hover:text-indigo-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </button>
            {% endif %}
        </div>

        <!-- Messages Area -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto px-6 py-4 space-y-3 bg-gray-50">
            <div id="loadingMessages" class="flex justify-center items-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-600"></div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="px-6 py-1 text-xs text-gray-500 italic hidden"></div>

        <!-- Message Input -->
        <div class="bg-white px-4 py-3 border-t border-gray-200">
            <div class="flex gap-3">
                <input type="text" id="messageInput" placeholder="Type a message..."
                       class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm"
                       autocomplete="off">
                <button id="sendBtn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Send
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const currentUserId = {{ request.user.id }};
const roomId = {{ room.id }};
let chatSocket = null;
let usePolling = false;
let pollInterval = null;
let lastMessageId = 0;
let pendingMessageIds = new Set();
let typingTimeout = null;

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const isToday = date.toDateString() === now.toDateString();
    if (isToday) {
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function appendMessage(msg) {
    const container = document.getElementById('messagesContainer');
    const isMe = msg.sender_id === currentUserId;

    if (msg.message_id && pendingMessageIds.has(msg.message_id)) {
        return;
    }
    
    if (msg.message_id) {
        lastMessageId = Math.max(lastMessageId, msg.message_id);
        pendingMessageIds.add(msg.message_id);
    }

    const msgDiv = document.createElement('div');
    msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in`;
    msgDiv.setAttribute('data-message-id', msg.message_id || '');
    msgDiv.innerHTML = `
        <div class="max-w-xs lg:max-w-md px-4 py-2 rounded-2xl shadow-sm ${
            isMe
                ? 'bg-indigo-600 text-white rounded-br-sm'
                : 'bg-white text-gray-800 border border-gray-200 rounded-bl-sm'
        }">
            ${!isMe ? `<p class="text-xs font-semibold ${isMe ? 'text-indigo-200' : 'text-indigo-600'} mb-1">${escapeHtml(msg.sender_name)}</p>` : ''}
            <p class="text-sm break-words">${escapeHtml(msg.message)}</p>
            <p class="text-xs mt-1 ${isMe ? 'text-indigo-200' : 'text-gray-400'} text-right">${formatTime(msg.timestamp)}</p>
            ${isMe && msg.is_read ? `<p class="text-xs ${isMe ? 'text-indigo-200' : 'text-gray-400'} text-right mt-1">✓✓ Read</p>` : ''}
        </div>
    `;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

function loadMessages() {
    fetch(`/chat/api/messages/${roomId}/`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(res => res.json())
    .then(data => {
        const loadingDiv = document.getElementById('loadingMessages');
        if (loadingDiv) loadingDiv.remove();
        
        if (data.messages) {
            data.messages.forEach(msg => {
                if (msg.message_id && msg.message_id > lastMessageId) {
                    lastMessageId = msg.message_id;
                }
                appendMessage(msg);
            });
        }
    })
    .catch(err => {
        console.error('Error loading messages:', err);
        const loadingDiv = document.getElementById('loadingMessages');
        if (loadingDiv) {
            loadingDiv.innerHTML = '<p class="text-gray-500 text-sm">Could not load messages</p>';
        }
    });
}

function connectWebSocket() {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}/ws/chat/${roomId}/`;

    try {
        chatSocket = new WebSocket(wsUrl);

        chatSocket.onopen = function() {
            const statusEl = document.getElementById('connectionStatus');
            if (statusEl) {
                statusEl.textContent = 'Online';
                statusEl.classList.add('text-green-500');
                statusEl.classList.remove('text-gray-500', 'text-red-500');
            }
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type === 'chat_message') {
                appendMessage(data);
            } else if (data.type === 'typing') {
                showTypingIndicator(data.user_name, data.is_typing);
            } else if (data.type === 'read_receipt') {
                updateReadReceipts(data.message_ids);
            }
        };

        chatSocket.onclose = function() {
            const statusEl = document.getElementById('connectionStatus');
            if (statusEl) {
                statusEl.textContent = 'Using polling mode';
                statusEl.classList.add('text-gray-500');
                statusEl.classList.remove('text-green-500');
            }
            startPolling();
        };

        chatSocket.onerror = function() {
            chatSocket.close();
        };
    } catch(e) {
        startPolling();
    }
}

function startPolling() {
    if (usePolling) return;
    usePolling = true;
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(() => {
        fetch(`/chat/api/messages/${roomId}/?after=${lastMessageId}`)
            .then(res => res.json())
            .then(data => {
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.message_id && !pendingMessageIds.has(msg.message_id)) {
                            appendMessage(msg);
                        }
                    });
                }
            })
            .catch(() => {});
    }, 3000);
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message) return;

    if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
        chatSocket.send(JSON.stringify({ message: message }));
        input.value = '';
    } else {
        fetch(`/chat/api/send/${roomId}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                appendMessage(data.message_data);
                input.value = '';
            }
        });
    }
}

let typingTimeoutId;
function sendTypingIndicator(isTyping) {
    if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
        chatSocket.send(JSON.stringify({
            type: 'typing',
            is_typing: isTyping
        }));
    }
}

function showTypingIndicator(userName, isTyping) {
    const indicator = document.getElementById('typingIndicator');
    if (isTyping) {
        indicator.textContent = `${userName} is typing...`;
        indicator.classList.remove('hidden');
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            indicator.classList.add('hidden');
        }, 3000);
    } else {
        indicator.classList.add('hidden');
    }
}

function updateReadReceipts(messageIds) {
    // Update UI to show messages as read
    messageIds.forEach(msgId => {
        const msgElement = document.querySelector(`[data-message-id="${msgId}"]`);
        if (msgElement) {
            // Update read status indicator
        }
    });
}

// Event listeners
const sendBtn = document.getElementById('sendBtn');
const messageInput = document.getElementById('messageInput');

if (sendBtn) sendBtn.addEventListener('click', sendMessage);
if (messageInput) {
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    
    let typingTimer;
    messageInput.addEventListener('input', function() {
        sendTypingIndicator(true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            sendTypingIndicator(false);
        }, 1000);
    });
}

// Initialize
loadMessages();
connectWebSocket();

// Mark messages as read when page loads
fetch(`/chat/api/mark-read/${roomId}/`, {
    method: 'POST',
    headers: { 'X-CSRFToken': csrftoken }
});

// Group info button
const groupInfoBtn = document.getElementById('groupInfoBtn');
if (groupInfoBtn) {
    groupInfoBtn.addEventListener('click', () => {
        alert('Group info feature coming soon');
    });
}
</script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in {
    animation: fadeIn 0.3s ease-out;
}
#messagesContainer::-webkit-scrollbar {
    width: 6px;
}
#messagesContainer::-webkit-scrollbar-thumb {
    background: #d1d5db;
    border-radius: 3px;
}
</style>
{% endblock %}
