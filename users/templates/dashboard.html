{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}
{% block page_title %}Dashboard Overview{% endblock %}

{% block content %}

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-1/2 transform -translate-y-1/2 mx-auto w-16 h-16">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
    </div>
</div>

<div class="space-y-6" id="dashboardContent">
    <!-- Content will be loaded via AJAX -->
    <div class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600"></div>
        <span class="ml-3 text-gray-600">Loading dashboard...</span>
    </div>
</div>

<script>
// Loading overlay
const loadingOverlay = document.getElementById('loadingOverlay');

function loadDashboard() {
    loadingOverlay.classList.remove('hidden');
    
    fetch(window.location.href, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            renderDashboard(data);
        }
        loadingOverlay.classList.add('hidden');
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('dashboardContent').innerHTML = '<div class="text-center text-red-500 py-10">Error loading dashboard. Please refresh the page.</div>';
        loadingOverlay.classList.add('hidden');
    });
}

function renderDashboard(data) {
    const container = document.getElementById('dashboardContent');
    
    if (data.role === 'ADMIN') {
        container.innerHTML = `
            <!-- Welcome Header with Gradient -->
            <div class="bg-gradient-to-r from-orange-500 to-blue-600 text-white p-8 rounded-2xl shadow-xl mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold mb-2">Welcome back, {{ request.user.username }}! 👑</h1>
                        <p class="text-orange-100 text-lg">System Administrator • Full access to all modules</p>
                    </div>
                    <div class="bg-white/20 p-4 rounded-xl backdrop-blur-sm">
                        <p class="text-sm opacity-90">Last login: {{ request.user.last_login|date:"M d, Y H:i" }}</p>
                    </div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Total Users -->
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-orange-500 hover:shadow-xl transition duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Users</p>
                            <h3 class="text-3xl font-bold text-gray-800">${data.stats.total_users}</h3>
                        </div>
                        <div class="bg-orange-100 p-3 rounded-full">
                            <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Total Projects -->
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500 hover:shadow-xl transition duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Projects</p>
                            <h3 class="text-3xl font-bold text-gray-800">${data.stats.total_projects}</h3>
                        </div>
                        <div class="bg-blue-100 p-3 rounded-full">
                            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Total Tasks -->
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500 hover:shadow-xl transition duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Tasks</p>
                            <h3 class="text-3xl font-bold text-gray-800">${data.stats.total_tasks}</h3>
                        </div>
                        <div class="bg-green-100 p-3 rounded-full">
                            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-8">
                <div class="bg-gradient-to-r from-orange-500 to-orange-600 px-6 py-4">
                    <h3 class="text-xl font-bold text-white">User Management</h3>
                </div>
                <div class="p-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                ${data.users.map(user => `
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div class="flex items-center">
                                            <div class="bg-gradient-to-br from-orange-400 to-blue-500 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm mr-3">
                                                ${user.username.charAt(0).toUpperCase()}
                                            </div>
                                            <div class="text-sm font-medium text-gray-900">${escapeHtml(user.username)}</div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${escapeHtml(user.email)}</td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 py-1 text-xs rounded-full ${user.role === 'ADMIN' ? 'bg-purple-100 text-purple-800' : user.role === 'TEAM_LEAD' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">
                                            ${user.role}
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 py-1 text-xs rounded-full ${user.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                            ${user.is_active ? 'Active' : 'Inactive'}
                                        </span>
                                    </td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    } 
    else if (data.role === 'TEAMLEAD') {
        container.innerHTML = `
            <!-- Welcome Header -->
            <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-8 rounded-2xl shadow-xl mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold mb-2">Welcome back, {{ request.user.username }}! 👋</h1>
                        <p class="text-blue-100 text-lg">Team Lead • Manage your team and projects</p>
                    </div>
                    <div class="bg-white/20 p-4 rounded-xl backdrop-blur-sm">
                        <p class="text-sm opacity-90">{{ request.user.email }}</p>
                    </div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500">
                    <p class="text-gray-500 text-sm">Total Projects</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.total_projects}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-yellow-500">
                    <p class="text-gray-500 text-sm">Active Tasks</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.active_tasks}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500">
                    <p class="text-gray-500 text-sm">Team Members</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.team_members}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-purple-500">
                    <p class="text-gray-500 text-sm">Completed</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.completed_tasks}</h3>
                </div>
            </div>
        `;
    } 
    else if (data.role === 'EMPLOYEE') {
        container.innerHTML = `
            <!-- Welcome Header -->
            <div class="bg-gradient-to-r from-green-500 to-teal-600 text-white p-8 rounded-2xl shadow-xl mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold mb-2">Welcome back, {{ request.user.username }}! 👋</h1>
                        <p class="text-green-100 text-lg">Manage your tasks and projects efficiently</p>
                    </div>
                    <div class="bg-white/20 p-4 rounded-xl backdrop-blur-sm">
                        <p class="text-sm opacity-90">{{ request.user.email }}</p>
                    </div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500">
                    <p class="text-gray-500 text-sm">My Tasks</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.tasks_count}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500">
                    <p class="text-gray-500 text-sm">Completed</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.completed_tasks}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-yellow-500">
                    <p class="text-gray-500 text-sm">Pending</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.pending_tasks}</h3>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-purple-500">
                    <p class="text-gray-500 text-sm">My Projects</p>
                    <h3 class="text-3xl font-bold text-gray-800">${data.stats.projects_count}</h3>
                </div>
            </div>
        `;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load dashboard on page load
loadDashboard();
</script>

<style>
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
    
    .animate-spin {
        animation: spin 1s linear infinite;
    }
    
    #loadingOverlay {
        transition: all 0.3s ease;
    }
</style>

{% endblock %}
