{% extends "base.html" %}
{% block title %}Designation Members{% endblock %}
{% block page_title %}Designation: <span id="designationName">{{ designation.name }}</span>{% endblock %}

{% block content %}
<div class="space-y-6">

    <!-- Back Button -->
    <div>
        <button onclick="goBack()" class="back-btn-small">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </button>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="w-10 h-10 border-2 border-[#4a9d7e] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Users will be loaded here via AJAX -->
    <div id="usersContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

</div>

<script>
function loadDesignationUsers(desigId) {
    const loadingOverlay = document.getElementById('loadingOverlay');
    loadingOverlay.classList.remove('hidden');
    
    fetch(`/designation/${desigId}/`, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById('designationName').innerText = data.designation;

            const container = document.getElementById('usersContainer');
            container.innerHTML = '';

            if(data.users.length > 0){
                data.users.forEach(user => {
                    const card = document.createElement('div');
                    card.className = "bg-white dark:bg-[#111827] rounded-xl border border-slate-200 dark:border-white/10 p-5 hover:shadow-lg transition-all duration-200";
                    card.innerHTML = `
                        <div class="flex items-start gap-3">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name || user.username)}&background=4a9d7e&color=fff&size=40&bold=true"
                                class="w-10 h-10 rounded-full object-cover">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-base font-semibold text-slate-800 dark:text-white truncate">${escapeHtml(user.full_name || user.username)}</h3>
                                <p class="text-sm text-slate-500 dark:text-slate-400 truncate">${escapeHtml(user.email)}</p>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span class="text-xs px-2 py-0.5 bg-[#eef6f2] dark:bg-[#1a3a2a] text-[#4a9d7e] rounded-full">${escapeHtml(user.role_display || user.role)}</span>
                                    <span class="text-xs px-2 py-0.5 bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-400 rounded-full">${escapeHtml(user.department)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fa-regular fa-users text-4xl text-slate-300 dark:text-slate-600 mb-3"></i>
                        <p class="text-slate-500 dark:text-slate-400">No users found for this designation.</p>
                    </div>
                `;
            }
        }
        loadingOverlay.classList.add('hidden');
    })
    .catch(err => {
        console.error("Error loading designation users:", err);
        loadingOverlay.classList.add('hidden');
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function goBack() {
    window.history.back();
}

loadDesignationUsers({{ designation.id }});
</script>
{% endblock %}
