{% extends "base.html" %}

{% block title %}User Detail{% endblock %}
{% block page_title %}Member Details{% endblock %}

{% block content %}

<button onclick="window.history.back()"
            class="flex items-center gap-2 bg-white text-gray-800 font-semibold px-4 py-2 rounded-lg shadow-md 
                   hover:bg-orange-500 hover:text-white transition duration-300 transform hover:-translate-y-1 hover:scale-105">
            ← Back
        </button>

<!-- Loading State -->
<div id="loadingState" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600"></div>
    <span class="ml-3 text-gray-600">Loading user details...</span>
</div>

<!-- Content Container - Hidden until loaded -->
<div id="contentContainer" class="max-w-6xl mx-auto space-y-6 hidden"></div>

<script>
// Template for user details
function createUserTemplate(data) {
    return `
    <!-- ================= TOP PROFILE CARD ================= -->
    <div class="bg-white shadow rounded-lg p-6 flex gap-6 items-center">

        <!-- Avatar -->
        <div class="w-28 h-28 bg-gray-200 rounded-full flex items-center justify-center text-4xl font-bold text-gray-600">
            ${data.user.username.charAt(0).toUpperCase()}
        </div>

        <!-- Basic Info -->
        <div class="flex-1">
            <h2 class="text-2xl font-semibold text-gray-800">
                ${escapeHtml(data.user.full_name)}
            </h2>

            <p class="text-gray-500 mt-1">
                ${escapeHtml(data.profile.designation)} · ${escapeHtml(data.profile.department)}
            </p>

            <div class="flex gap-6 mt-3 text-sm text-gray-600">
                <span>📧 ${escapeHtml(data.user.email)}</span>
                <span>📅 ${escapeHtml(data.profile.date_of_joining)}</span>
            </div>
        </div>

        <!-- Edit Button -->
        <a href="/edit-user/${data.user.id}/"
           class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded shadow edit-link">
            Edit
        </a>
    </div>

    <!-- ================= BASIC DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Basic Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Employee ID</p>
                <p class="font-medium">${escapeHtml(data.profile.employee_id)}</p>
            </div>
            <div>
                <p class="text-gray-500">Phone</p>
                <p class="font-medium">${escapeHtml(data.profile.phone)}</p>
            </div>
            <div>
                <p class="text-gray-500">Department</p>
                <p class="font-medium">${escapeHtml(data.profile.department)}</p>
            </div>
            <div>
                <p class="text-gray-500">Designation</p>
                <p class="font-medium">${escapeHtml(data.profile.designation)}</p>
            </div>
            <div>
                <p class="text-gray-500">Role</p>
                <p class="font-medium">${escapeHtml(data.user.role)}</p>
            </div>
            <div>
                <p class="text-gray-500">Status</p>
                ${data.user.is_active ? 
                    '<span class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">Active</span>' : 
                    '<span class="inline-block bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs">Inactive</span>'
                }
            </div>
        </div>
    </div>

    <!-- ================= SALARY DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Salary Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">CTC</p>
                <p class="font-medium">${escapeHtml(data.profile.ctc)}</p>
            </div>
            <div>
                <p class="text-gray-500">Salary In Hand</p>
                <p class="font-medium">${escapeHtml(data.profile.salary_in_hand)}</p>
            </div>
        </div>
    </div>

    <!-- ================= BANK DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Bank Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Bank Name</p>
                <p class="font-medium">${escapeHtml(data.profile.bank_name)}</p>
            </div>
            <div>
                <p class="text-gray-500">Account Number</p>
                <p class="font-medium">${escapeHtml(data.profile.account_no)}</p>
            </div>
            <div>
                <p class="text-gray-500">IFSC Code</p>
                <p class="font-medium">${escapeHtml(data.profile.ifsc)}</p>
            </div>
        </div>
    </div>

    <!-- ================= VERIFICATION DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Verification Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Aadhar Number</p>
                <p class="font-medium">${escapeHtml(data.profile.aadhar_no)}</p>
            </div>
            <div>
                <p class="text-gray-500">PAN Number</p>
                <p class="font-medium">${escapeHtml(data.profile.pan_no)}</p>
            </div>
        </div>
    </div>

    <!-- ================= ADDITIONAL DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Additional Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Emergency Contact</p>
                <p class="font-medium">${escapeHtml(data.profile.emergency_contact)}</p>
            </div>
            <div>
                <p class="text-gray-500">Address</p>
                <p class="font-medium">${escapeHtml(data.profile.address)}</p>
            </div>
        </div>
    </div>
    `;
}

function escapeHtml(text) {
    if (!text) return '—';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function loadUserDetails() {
    const loadingState = document.getElementById('loadingState');
    const contentContainer = document.getElementById('contentContainer');
    
    fetch(window.location.href, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Hide loading, show content
            loadingState.classList.add('hidden');
            contentContainer.classList.remove('hidden');
            
            // Populate content
            contentContainer.innerHTML = createUserTemplate(data);
            
            // Handle edit link clicks with AJAX
            document.querySelectorAll('.edit-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    loadPage(this.getAttribute('href'));
                });
            });
        }
    })
    .catch(error => {
        console.error('Error:', error);
        loadingState.innerHTML = '<div class="text-center text-red-500">Error loading user details. Please try again.</div>';
    });
}

function loadPage(url) {
    // Show loading
    document.body.innerHTML = `
        <div class="flex justify-center items-center h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600"></div>
            <span class="ml-3 text-gray-600">Loading...</span>
        </div>
    `;
    
    fetch(url, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        if (response.headers.get('content-type')?.includes('application/json')) {
            return response.json().then(data => {
                if (data.success) {
                    // Handle JSON response
                    document.body.innerHTML = `
                        <div class="container mx-auto p-8">
                            <button onclick="window.location.reload()" class="mb-4 bg-gray-500 text-white px-4 py-2 rounded">Back</button>
                            <div class="bg-white shadow rounded-lg p-6">
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        </div>
                    `;
                }
            });
        } else {
            return response.text().then(html => {
                document.body.innerHTML = html;
                // Re-initialize scripts for the new page
                const scripts = document.querySelectorAll('script');
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                });
            });
        }
    })
    .catch(error => {
        console.error('Error:', error);
        document.body.innerHTML = '<div class="text-center text-red-500 p-8">Error loading page. Please refresh.</div>';
    });
}

// Load user details on page load
loadUserDetails();
</script>

<style>
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
    
    .animate-spin {
        animation: spin 1s linear infinite;
    }
</style>

{% endblock %}
