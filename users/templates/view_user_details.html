{% extends "base.html" %}

{% block title %}User Detail{% endblock %}
{% block page_title %}Member Details{% endblock %}

{% block content %}

<!-- Back Button -->
<div class="max-w-6xl mx-auto mb-4">
    <button onclick="goBack()"
            class="flex items-center gap-2 bg-gray-100 hover:bg-orange-500 text-gray-700 hover:text-white font-semibold px-4 py-2 rounded-lg shadow-md transition duration-300 transform hover:-translate-y-1 hover:scale-105">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back
    </button>
</div>

<!-- Loading State -->
<div id="loadingState" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600"></div>
    <span class="ml-3 text-gray-600">Loading user details...</span>
</div>

<!-- Content Container - Hidden until loaded -->
<div id="contentContainer" class="max-w-6xl mx-auto space-y-6 hidden"></div>

<!-- Edit Profile Modal (Only for own profile) -->
<div id="editProfileModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto z-50">
    <div class="relative top-20 mx-auto max-w-md bg-white rounded-lg shadow-lg p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">Edit My Information</h3>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        
        <form id="editProfileForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="self_edit" value="1">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Profile Image</label>
                <input type="file" name="profile_image" accept="image/*" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                <p class="text-xs text-gray-400 mt-1">Upload JPG, PNG, or GIF</p>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="phone" id="modal_phone" class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact</label>
                <input type="text" name="emergency_contact" id="modal_emergency" class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                <textarea name="address" id="modal_address" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2"></textarea>
            </div>
            
            <div class="flex justify-end gap-2">
                <button type="button" onclick="closeEditModal()" 
                        class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg transition">Cancel</button>
                <button type="submit" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
// Store current user ID for comparison
const currentLoggedInUserId = {{ request.user.id }};
const viewingUserId = {{ user_id|default:0 }};
const isOwnProfile = (currentLoggedInUserId === viewingUserId);

// Template for user details
function createUserTemplate(data) {
    // Show Edit button only if viewing own profile
    const editButtonHtml = isOwnProfile ? 
        `<button onclick="openEditModalWithData('${escapeHtml(data.profile.phone)}', '${escapeHtml(data.profile.emergency_contact)}', '${escapeHtml(data.profile.address)}')" 
            class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded shadow transition">
            ✏️ Edit My Info
        </button>` : 
        `<a href="/user/${data.user.id}/edit/" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded shadow edit-link">
            Edit
        </a>`;
    
    // Avatar with profile image support
    const avatarHtml = data.profile.profile_image ? 
        `<img src="${escapeHtml(data.profile.profile_image)}" alt="Profile Image" class="w-28 h-28 rounded-full object-cover border-4 border-indigo-300">` :
        `<div class="w-28 h-28 bg-indigo-100 rounded-full flex items-center justify-center text-4xl font-bold text-indigo-600 border-4 border-indigo-300">
            ${data.user.username.charAt(0).toUpperCase()}
        </div>`;
    
    return `
    <!-- ================= TOP PROFILE CARD ================= -->
    <div class="bg-white shadow rounded-lg p-6 flex gap-6 items-center">

        <!-- Avatar -->
        <div>
            ${avatarHtml}
        </div>

        <!-- Basic Info -->
        <div class="flex-1">
            <h2 class="text-2xl font-semibold text-gray-800">
                ${escapeHtml(data.user.full_name)}
            </h2>

            <p class="text-gray-500 mt-1">
                ${escapeHtml(data.profile.designation)} · ${escapeHtml(data.profile.department)}
            </p>

            <div class="flex gap-6 mt-3 text-sm text-gray-600">
                <span>📧 ${escapeHtml(data.user.email)}</span>
                <span>📅 ${escapeHtml(data.profile.date_of_joining)}</span>
            </div>
        </div>

        <!-- Edit Button -->
        ${editButtonHtml}
    </div>

    <!-- ================= BASIC DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Basic Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Employee ID</p>
                <p class="font-medium">${escapeHtml(data.profile.employee_id)}</p>
            </div>
            <div>
                <p class="text-gray-500">Phone</p>
                <p class="font-medium">${escapeHtml(data.profile.phone)}</p>
            </div>
            <div>
                <p class="text-gray-500">Department</p>
                <p class="font-medium">${escapeHtml(data.profile.department)}</p>
            </div>
            <div>
                <p class="text-gray-500">Designation</p>
                <p class="font-medium">${escapeHtml(data.profile.designation)}</p>
            </div>
            <div>
                <p class="text-gray-500">Role</p>
                <p class="font-medium">${escapeHtml(data.user.role)}</p>
            </div>
            <div>
                <p class="text-gray-500">Status</p>
                ${data.user.is_active ? 
                    '<span class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">Active</span>' : 
                    '<span class="inline-block bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs">Inactive</span>'
                }
            </div>
        </div>
    </div>

    <!-- ================= SALARY DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Salary Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">CTC</p>
                <p class="font-medium">${escapeHtml(data.profile.ctc)}</p>
            </div>
            <div>
                <p class="text-gray-500">Salary In Hand</p>
                <p class="font-medium">${escapeHtml(data.profile.salary_in_hand)}</p>
            </div>
        </div>
    </div>

    <!-- ================= BANK DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Bank Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Bank Name</p>
                <p class="font-medium">${escapeHtml(data.profile.bank_name)}</p>
            </div>
            <div>
                <p class="text-gray-500">Account Number</p>
                <p class="font-medium">${escapeHtml(data.profile.account_no)}</p>
            </div>
            <div>
                <p class="text-gray-500">IFSC Code</p>
                <p class="font-medium">${escapeHtml(data.profile.ifsc)}</p>
            </div>
        </div>
    </div>

    <!-- ================= VERIFICATION DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Verification Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Aadhar Number</p>
                <p class="font-medium">${escapeHtml(data.profile.aadhar_no)}</p>
            </div>
            <div>
                <p class="text-gray-500">PAN Number</p>
                <p class="font-medium">${escapeHtml(data.profile.pan_no)}</p>
            </div>
        </div>
    </div>

    <!-- ================= ADDITIONAL DETAILS ================= -->
    <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-semibold mb-4">Additional Details</h3>
        <div class="grid grid-cols-2 gap-6 text-sm">
            <div>
                <p class="text-gray-500">Emergency Contact</p>
                <p class="font-medium">${escapeHtml(data.profile.emergency_contact)}</p>
            </div>
            <div>
                <p class="text-gray-500">Address</p>
                <p class="font-medium">${escapeHtml(data.profile.address)}</p>
            </div>
        </div>
    </div>
    `;
}

function escapeHtml(text) {
    if (!text) return '—';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Store current data for modal
let currentPhone = '';
let currentEmergency = '';
let currentAddress = '';

function openEditModalWithData(phone, emergency, address) {
    currentPhone = phone === '—' ? '' : phone;
    currentEmergency = emergency === '—' ? '' : emergency;
    currentAddress = address === '—' ? '' : address;
    
    document.getElementById('modal_phone').value = currentPhone;
    document.getElementById('modal_emergency').value = currentEmergency;
    document.getElementById('modal_address').value = currentAddress;
    
    document.getElementById('editProfileModal').classList.remove('hidden');
}

function closeEditModal() {
    document.getElementById('editProfileModal').classList.add('hidden');
}

// Handle self-edit form submission via AJAX
document.getElementById('editProfileForm')?.addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    
    fetch(window.location.href, {
        method: 'POST',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(data.message);
            location.reload();
        } else {
            alert(data.error || 'Error updating profile');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Network error. Please try again.');
    });
});

function loadUserDetails() {
    const loadingState = document.getElementById('loadingState');
    const contentContainer = document.getElementById('contentContainer');
    
    fetch(window.location.href, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            loadingState.classList.add('hidden');
            contentContainer.classList.remove('hidden');
            contentContainer.innerHTML = createUserTemplate(data);
            
            // Handle edit link clicks with AJAX (for admin edit button)
            document.querySelectorAll('.edit-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    loadPage(this.getAttribute('href'));
                });
            });
        }
    })
    .catch(error => {
        console.error('Error:', error);
        loadingState.innerHTML = '<div class="text-center text-red-500">Error loading user details. Please try again.</div>';
    });
}

function loadPage(url) {
    fetch(url, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        if (response.headers.get('content-type')?.includes('application/json')) {
            return response.json().then(data => {
                if (data.success) {
                    document.body.innerHTML = `
                        <div class="container mx-auto p-8">
                            <button onclick="window.location.reload()" class="mb-4 bg-gray-500 text-white px-4 py-2 rounded">Back</button>
                            <div class="bg-white shadow rounded-lg p-6">
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        </div>
                    `;
                }
            });
        } else {
            return response.text().then(html => {
                document.body.innerHTML = html;
                const scripts = document.querySelectorAll('script');
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                });
            });
        }
    })
    .catch(error => {
        console.error('Error:', error);
        document.body.innerHTML = '<div class="text-center text-red-500 p-8">Error loading page. Please refresh.</div>';
    });
}

// Load user details on page load
loadUserDetails();
</script>

{% endblock %}
