{% extends "base.html" %}

{% block title %}Delete Task{% endblock %}
{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-lg rounded-lg p-8 text-center">
    <div class="mb-6">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Delete Task</h2>
        <p class="text-gray-500 mt-2">Are you sure you want to delete?</p>
        <p class="font-medium text-gray-700 mt-2">"{{ task.name }}"</p>
        <p class="text-sm text-gray-400 mt-1">ID: {{ task.id }}</p>
    </div>

    <div class="flex gap-4 justify-center">
        <form method="POST">
            {% csrf_token %}
            <button type="submit" 
                    class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium">
                Yes, Delete
            </button>
        </form>
        <a href="{% url 'view_project_detail' task.project.id %}" 
           class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded-lg font-medium">
            Cancel
        </a>
    </div>
</div>
{% endblock %}
