<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Request Sent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            width: 450px;
            text-align: center;
        }

        h2 {
            color: #f18f1f;
            margin-bottom: 25px;
        }

        p {
            color: #333;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Reset Request Sent</h2>
        <p>
            We have sent an email to your address with instructions to reset your password.<br>
            Please check your inbox (and spam folder) for the reset link.
        </p>
        <a href="{% url 'login_page' %}">Back to Login</a>
    </div>
</body>
</html>
