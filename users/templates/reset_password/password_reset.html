<!DOCTYPE html>
<html lang="en" class="dark:bg-[#0f1117]">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | ReadyTask PMS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    brand: { primary: '#4a9d7e', accent: '#4a9d7e' }
                },
                fontFamily: { sans: ['Outfit', 'sans-serif'] }
            }
        }
    }
</script>
<script>
    // Apply theme early to prevent flickering
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
    }
</script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Outfit', sans-serif;
        background: linear-gradient(135deg, #f6f7f9 0%, #eef2f6 100%);
    }
    .dark body {
        background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .message.show {
        animation: fadeIn 0.3s ease;
    }
    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .loading-text {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    input:focus {
        box-shadow: 0 0 0 3px rgba(74, 157, 126, 0.1);
    }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 bg-white/80 dark:bg-[#111827]/80 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm border border-slate-200 dark:border-white/10">
            <div class="w-8 h-8 rounded-md bg-[#4a9d7e] flex items-center justify-center">
                <i class="fa-solid fa-check-double text-white text-xs"></i>
            </div>
            <span class="text-base font-semibold text-slate-800 dark:text-white tracking-tight">ReadyTask PMS</span>
        </div>
    </div>

    <!-- Reset Password Card -->
    <div class="bg-white dark:bg-[#111827] rounded-2xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white text-center mb-2">Reset Password</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6">Enter your email and we'll send you a reset link</p>

            <form id="resetForm" method="post" action="/password/reset/">
                {% csrf_token %}

                <div class="mb-5">
                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email address</label>
                    <input type="email" id="email" name="email" 
                           class="w-full px-4 py-2.5 bg-slate-50 dark:bg-[#1a1f2e] border border-slate-200 dark:border-white/10 rounded-xl text-sm text-slate-800 dark:text-white outline-none transition-all focus:border-[#4a9d7e] focus:ring-2 focus:ring-[#4a9d7e]/20"
                           placeholder="you@example.com" autocomplete="email" required>
                </div>

                <button type="submit" id="resetBtn"
                        class="w-full bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white font-semibold py-2.5 rounded-xl transition-all duration-200 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg">
                    <span id="btnText">Send Reset Link</span>
                </button>

                <div id="message" class="message mt-4 p-3 rounded-lg text-sm text-center hidden"></div>
            </form>

            <div class="text-center mt-6">
                <a href="{% url 'login_page' %}" class="text-sm text-[#4a9d7e] hover:text-[#3d8a6d] transition">
                    ← Back to Login
                </a>
            </div>

            <div class="mt-6 pt-5 border-t border-slate-100 dark:border-white/5 text-center">
                <p class="text-xs text-slate-400 dark:text-slate-500">
                    Don't have an account? <strong class="text-[#4a9d7e]">Contact your administrator</strong>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script>
const form = document.getElementById("resetForm");
const emailInput = document.getElementById("email");
const messageDiv = document.getElementById("message");
const resetBtn = document.getElementById("resetBtn");
const btnText = document.getElementById("btnText");

function getCSRFToken() {
    return document.cookie
        .split("; ")
        .find(row => row.startsWith("csrftoken="))
        ?.split("=")[1];
}

function showLoading() {
    resetBtn.disabled = true;
    btnText.innerHTML = '<span class="loading-text"><span class="spinner"></span>Sending...</span>';
}

function hideLoading() {
    resetBtn.disabled = false;
    btnText.innerHTML = 'Send Reset Link';
}

function showMessage(message, type = "error") {
    messageDiv.innerHTML = message;
    messageDiv.className = `message show rounded-lg p-3 text-sm text-center ${
        type === "error" ? "bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800" :
        type === "success" ? "bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800" :
        "bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 dark:text-yellow-400 border border-yellow-200 dark:border-yellow-800"
    }`;
    messageDiv.classList.add("show");
    
    setTimeout(() => {
        messageDiv.classList.remove("show");
    }, 5000);
}

function clearMessage() {
    messageDiv.classList.remove("show");
}

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = emailInput.value.trim();

    if (!email) {
        showMessage("Email is required", "error");
        emailInput.focus();
        return;
    }

    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showMessage("Please enter a valid email address", "error");
        emailInput.focus();
        return;
    }

    clearMessage();
    showLoading();

    // First check if email exists in your system
    $.ajax({
        url: "/user/check-email-exists/",
        method: "POST",
        contentType: "application/json",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        data: JSON.stringify({ email: email }),
        success: function(data) {
            if (data.exists) {
                // Email exists - submit form to Django's password reset
                $.ajax({
                    url: "/password/reset/",
                    method: "POST",
                    data: {
                        email: email,
                        csrfmiddlewaretoken: getCSRFToken()
                    },
                    headers: {
                        "X-CSRFToken": getCSRFToken()
                    },
                    success: function(response) {
                        hideLoading();
                        showMessage("✅ Password reset link sent to your email! Redirecting...", "success");
                        setTimeout(() => {
                            window.location.href = "/password/reset/done/";
                        }, 1500);
                    },
                    error: function(xhr) {
                        console.error("Reset error:", xhr);
                        hideLoading();
                        // Django's PasswordResetView returns HTML, so we check if it succeeded
                        if (xhr.status === 200) {
                            showMessage("✅ Password reset link sent to your email! Redirecting...", "success");
                            setTimeout(() => {
                                window.location.href = "/password/reset/done/";
                            }, 1500);
                        } else {
                            showMessage("Something went wrong. Please try again.", "error");
                        }
                    }
                });
            } else {
                hideLoading();
                showMessage(
                    '❌ No account found with this email. Please contact your administrator.', 
                    "error"
                );
            }
        },
        error: function(xhr) {
            console.error("Email check error:", xhr);
            hideLoading();
            if (xhr.status === 404) {
                showMessage("Email check service unavailable. Please try again later.", "error");
            } else {
                showMessage("Server error. Please try again later.", "error");
            }
        }
    });
});

emailInput.addEventListener("input", clearMessage);

emailInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        form.dispatchEvent(new Event("submit"));
    }
});
</script>

</body>
</html>
