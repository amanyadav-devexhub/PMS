<!DOCTYPE html>
<html lang="en" class="dark:bg-[#0f1117]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent | ReadyTask PMS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#4a9d7e', accent: '#4a9d7e' }
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <script>
       
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f6f7f9 0%, #eef2f6 100%);
        }
        .dark body {
            background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
   
    <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 bg-white/80 dark:bg-[#111827]/80 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm border border-slate-200 dark:border-white/10">
            <div class="w-8 h-8 rounded-md bg-[#4a9d7e] flex items-center justify-center">
                <i class="fa-solid fa-check-double text-white text-xs"></i>
            </div>
            <span class="text-base font-semibold text-slate-800 dark:text-white tracking-tight">ReadyTask PMS</span>
        </div>
    </div>

   
    <div class="container bg-white dark:bg-[#111827] rounded-2xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="p-8 text-center">
           
            <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-envelope-circle-check text-4xl text-green-600 dark:text-green-400"></i>
            </div>

            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-3">Check Your Email</h2>
            
            <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-6">
                We've sent password reset instructions to your email address.<br>
                Please check your inbox (and spam folder) for the reset link.
            </p>

            <div class="space-y-3">
                <a href="{% url 'login_page' %}" 
                   class="inline-flex items-center justify-center gap-2 w-full bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white font-semibold py-2.5 px-4 rounded-xl transition-all duration-200 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                    Back to Login
                </a>
                
            </div>

            <div class="mt-6 pt-5 border-t border-slate-100 dark:border-white/5">
                <p class="text-xs text-slate-400 dark:text-slate-500">
                    Didn't receive the email? Check your spam folder or 
                    <a href="{% url 'login_page' %}" class="text-[#4a9d7e] hover:underline">try again</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleTheme() {
    const html = document.documentElement;
    html.classList.toggle('dark');
    localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
}
</script>

</body>
</html>
