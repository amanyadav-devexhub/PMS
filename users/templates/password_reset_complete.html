<!DOCTYPE html>
<html lang="en" class="dark:bg-[#0f1117]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | ReadyTask PMS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#4a9d7e', accent: '#4a9d7e' }
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <script>
        // Apply theme early to prevent flickering
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f6f7f9 0%, #eef2f6 100%);
        }
        .dark body {
            background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes checkmark {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .checkmark-animation {
            animation: checkmark 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 bg-white/80 dark:bg-[#111827]/80 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm border border-slate-200 dark:border-white/10">
            <div class="w-8 h-8 rounded-md bg-[#4a9d7e] flex items-center justify-center">
                <i class="fa-solid fa-check-double text-white text-xs"></i>
            </div>
            <span class="text-base font-semibold text-slate-800 dark:text-white tracking-tight">ReadyTask PMS</span>
        </div>
    </div>

    <!-- Success Card -->
    <div class="container bg-white dark:bg-[#111827] rounded-2xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="p-8 text-center">
            <!-- Success Animation Icon -->
            <div class="w-24 h-24 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6 checkmark-animation">
                <i class="fa-solid fa-circle-check text-5xl text-green-600 dark:text-green-400"></i>
            </div>

            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-3">Password Reset Successful!</h2>
            
            <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-2">
                Your password has been reset successfully.
            </p>
            
            <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-8">
                You can now log in with your new password.
            </p>

            <!-- Login Button -->
            <a href="{% url 'login_page' %}" 
               class="inline-flex items-center justify-center gap-2 w-full bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg">
                <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>
                Login to Your Account
            </a>

            <!-- Additional Options -->
            <div class="mt-6 pt-5 border-t border-slate-100 dark:border-white/5">
                <p class="text-xs text-slate-400 dark:text-slate-500">
                    Having trouble? <a href="#" class="text-[#4a9d7e] hover:underline">Contact Support</a>
                </p>
            </div>

            <!-- Redirect Counter (Optional) -->
            <div class="mt-4">
                <p class="text-xs text-slate-400 dark:text-slate-500">
                    Redirecting to login in <span id="countdown" class="font-semibold text-[#4a9d7e]">5</span> seconds
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto redirect after 5 seconds
    let secondsLeft = 5;
    const countdownElement = document.getElementById('countdown');
    
    if (countdownElement) {
        const timer = setInterval(function() {
            secondsLeft--;
            countdownElement.textContent = secondsLeft;
            
            if (secondsLeft <= 0) {
                clearInterval(timer);
                window.location.href = "{% url 'login_page' %}";
            }
        }, 1000);
    }
</script>

</body>
</html>
