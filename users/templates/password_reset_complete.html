<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #f19328;
            margin-bottom: 20px;
        }

        p {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            background-color: #f58337;
            color: #fff;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Reset Successful</h2>
        <p>Your password has been reset successfully.</p>
        <a href="{% url 'login_page' %}">Click here to login</a>
    </div>
</body>
</html>
