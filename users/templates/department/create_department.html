{% extends "base.html" %}
{% block title %}{{ action }} Department{% endblock %}
{% block page_title %}{{ action }} Department{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white dark:bg-[#111827] border border-slate-200 dark:border-white/10 rounded-xl shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-100 dark:border-white/5">
            <h3 class="text-lg font-semibold text-slate-800 dark:text-white">{{ action }} Department</h3>
            <p class="text-sm text-slate-500">Enter the details below to manage your organization's departments.</p>
        </div>
        
        <form method="POST" class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-[13px] font-medium text-slate-700 dark:text-slate-300 mb-1.5">Department Name</label>
                <input type="text" name="name" value="{{ department.name|default:'' }}" 
                       placeholder="e.g. Engineering" required
                       class="w-full px-4 py-2.5 bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-lg text-sm outline-none focus:border-[#4a9d7e] transition">
            </div>

            <div class="flex items-center justify-end gap-3 pt-2">
                <a href="{% url 'departments' %}" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg transition">
                    Cancel
                </a>
                <button type="submit" class="bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-6 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                    {{ action }} Department
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
