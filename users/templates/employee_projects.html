{% extends "base.html" %}
{% block title %}My Projects{% endblock %}
{% block page_title %}My Projects{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6 max-w-7xl">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-1/2 transform -translate-y-1/2 mx-auto w-16 h-16">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
        </div>
    </div>

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">My Projects</h1>
            <p class="text-gray-500 mt-1">View and manage all projects assigned to you</p>
        </div>
        <div class="mt-4 md:mt-0">
            <span id="projectCount" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-medium">
                0 Projects
            </span>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-xl shadow-lg p-5 border-l-4 border-blue-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-500">Total Projects</p>
                    <h3 id="totalProjects" class="text-2xl font-bold text-gray-800">0</h3>
                </div>
                <div class="bg-blue-100 p-3 rounded-full">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-5 border-l-4 border-green-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-500">In Progress</p>
                    <h3 id="ongoingProjects" class="text-2xl font-bold text-gray-800">0</h3>
                </div>
                <div class="bg-green-100 p-3 rounded-full">
                    <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-5 border-l-4 border-purple-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-500">Completed</p>
                    <h3 id="completedProjects" class="text-2xl font-bold text-gray-800">0</h3>
                </div>
                <div class="bg-purple-100 p-3 rounded-full">
                    <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="mb-6">
        <div class="relative">
            <input type="text" 
                   id="searchInput"
                   placeholder="Search projects by name..." 
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 pl-10 text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none">
            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>
    </div>

    <!-- Projects Grid -->
    <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Loading State -->
        <div id="loadingState" class="col-span-3 text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600 mx-auto"></div>
            <p class="text-gray-500 mt-4">Loading your projects...</p>
        </div>
    </div>

</div>

<script>
// Get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

const csrftoken = getCookie('csrftoken');

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function loadEmployeeProjects() {
    const loadingOverlay = document.getElementById('loadingOverlay');
    loadingOverlay.classList.remove('hidden');
    
    fetch(window.location.href, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Update stats
            document.getElementById('totalProjects').innerText = data.total_projects;
            document.getElementById('ongoingProjects').innerText = data.ongoing_projects;
            document.getElementById('completedProjects').innerText = data.completed_projects;
            document.getElementById('projectCount').innerHTML = `${data.total_projects} Project${data.total_projects !== 1 ? 's' : ''}`;
            
            // Render projects
            renderProjects(data.projects);
        }
        loadingOverlay.classList.add('hidden');
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('projectsGrid').innerHTML = `
            <div class="col-span-3 text-center py-12">
                <div class="text-red-500">Error loading projects. Please refresh the page.</div>
            </div>
        `;
        loadingOverlay.classList.add('hidden');
    });
}

function renderProjects(projects) {
    const grid = document.getElementById('projectsGrid');
    
    if (!projects || projects.length === 0) {
        grid.innerHTML = `
            <div class="col-span-3">
                <div class="bg-white rounded-xl shadow-lg p-12 text-center max-w-lg mx-auto">
                    <svg class="w-20 h-20 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                    <h4 class="text-xl font-bold text-gray-700 mb-2">No Projects Assigned</h4>
                    <p class="text-gray-500 mb-6">You haven't been assigned to any projects yet.</p>
                    <p class="text-sm text-gray-400">When you're added to a project, it will appear here.</p>
                </div>
            </div>
        `;
        return;
    }
    
    let html = '';
    projects.forEach(project => {
        // Assigned users HTML
        let assignedHtml = '';
        project.assigned_users.forEach(user => {
            assignedHtml += `<span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full text-xs">${escapeHtml(user.username)}</span>`;
        });
        if (project.total_assigned > 3) {
            assignedHtml += `<span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full text-xs">+${project.total_assigned - 3}</span>`;
        }
        
        html += `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition transform hover:-translate-y-2 border border-gray-100 project-card">
                <div class="h-2 w-full ${project.header_color}"></div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-gray-800 project-name">${escapeHtml(project.name)}</h3>
                        <span class="px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${project.status_class}">
                            ${escapeHtml(project.status_display)}
                        </span>
                    </div>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-2">${escapeHtml(project.description)}</p>
                    <div class="space-y-2 mb-4 text-sm">
                        <div class="flex items-start">
                            <svg class="w-4 h-4 text-gray-400 mt-0.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <div class="flex flex-wrap gap-1">
                                ${assignedHtml || '<span class="text-gray-400 text-xs">No members assigned</span>'}
                            </div>
                        </div>
                        <div class="flex items-center text-gray-600">
                            <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span class="text-sm">${escapeHtml(project.start_date)} - ${escapeHtml(project.end_date)}</span>
                        </div>
                    </div>
                    <div class="mt-4">
                        <a href="${project.view_url}" 
                           class="inline-flex items-center justify-center w-full bg-orange-500 hover:bg-orange-600 text-white px-4 py-2.5 rounded-lg font-medium transition shadow-md hover:shadow-lg">
                            <span>View Project</span>
                            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        `;
    });
    
    grid.innerHTML = html;
}

// Search functionality
document.getElementById('searchInput')?.addEventListener('keyup', function() {
    let searchText = this.value.toLowerCase();
    let cards = document.querySelectorAll('.project-card');
    
    cards.forEach(card => {
        let projectName = card.querySelector('.project-name').textContent.toLowerCase();
        if (projectName.includes(searchText)) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
});

// Load projects on page load
loadEmployeeProjects();
</script>

<style>
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
    
    .animate-spin {
        animation: spin 1s linear infinite;
    }
    
    #loadingOverlay {
        transition: all 0.3s ease;
    }
    
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>

{% endblock %}
