{% extends "base.html" %}

{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

```
<div class="bg-white shadow-lg rounded-lg p-8">

    <h2 class="text-2xl font-semibold text-gray-700 mb-6">
        Edit User
    </h2>

    <form method="POST" class="space-y-5">
        {% csrf_token %}

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Email
            </label>
            <input type="email" name="email" value="{{ user.email }}" required
                   class="w-full border border-gray-300 rounded px-4 py-2
                          focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <!-- Username -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Username
            </label>
            <input type="text" name="username" value="{{ user.username }}" required
                   class="w-full border border-gray-300 rounded px-4 py-2
                          focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <!-- Role -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Role
            </label>
            <select name="role" required
                    class="w-full border border-gray-300 rounded px-4 py-2
                           focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                <option value="ADMIN" {% if user.role == "ADMIN" %}selected{% endif %}>Admin</option>
                <option value="TEAM_LEAD" {% if user.role == "TEAM_LEAD" %}selected{% endif %}>Team Lead</option>
                <option value="EMPLOYEE" {% if user.role == "EMPLOYEE" %}selected{% endif %}>Employee</option>
            </select>
        </div>

        <!-- Department -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Department
            </label>
            <select name="department" required
                    class="w-full border border-gray-300 rounded px-4 py-2
                           focus:ring-2 focus:ring-indigo-400 focus:outline-none">

                {% for dept in departments %}
                    <option value="{{ dept.id }}"
                    {% if profile.department_id == dept.id %}selected{% endif %}>
                        {{ dept.name }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <!-- Designation -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Designation
            </label>
            <select name="designation" required
                    class="w-full border border-gray-300 rounded px-4 py-2
                           focus:ring-2 focus:ring-indigo-400 focus:outline-none">

                {% for des in designations %}
                    <option value="{{ des.id }}"
                    {% if profile.designation_id == des.id %}selected{% endif %}>
                        {{ des.name }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <!-- Employee ID -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Employee ID
            </label>

            <input type="text" name="employee_id"
                   value="{{ profile.employee_id }}"
                   class="w-full border border-gray-300 rounded px-4 py-2
                          focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <!-- Phone -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Phone
            </label>

            <input type="text" name="phone"
                   value="{{ profile.phone }}"
                   class="w-full border border-gray-300 rounded px-4 py-2
                          focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <!-- Date of Joining -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Date of Joining
            </label>

            <input type="date" name="date_of_joining"
                   value="{{ profile.date_of_joining|date:'Y-m-d' }}"
                   class="w-full border border-gray-300 rounded px-4 py-2
                          focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <!-- Status -->
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Status
            </label>

            <select name="is_active"
                    class="w-full border border-gray-300 rounded px-4 py-2
                           focus:ring-2 focus:ring-indigo-400 focus:outline-none">

                <option value="True" {% if user.is_active %}selected{% endif %}>
                    Active
                </option>

                <option value="False" {% if not user.is_active %}selected{% endif %}>
                    Inactive
                </option>

            </select>
        </div>

        <!-- Buttons -->
        <div class="flex items-center gap-4 pt-4">

            <button type="submit"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded shadow transition">
                Update User
            </button>

            <a href="{% url 'admin_view_users' %}"
               class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded shadow transition">
                Cancel
            </a>

        </div>

    </form>

</div>
