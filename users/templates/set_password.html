{% extends "base.html" %}

{% block title %}Set Password{% endblock %}
{% block page_title %}Set Your Password{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">
    <!-- Card -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-gradient-to-r from-[#4a9d7e] to-[#3d8a6d] px-6 py-4">
            <h3 class="text-xl font-bold text-white">Set Your Password</h3>
            <p class="text-[#eef6f2] text-sm">Hello {{ user.username }}, please set your password to activate your account</p>
        </div>
        
        <div class="p-6">
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
                <div class="relative top-1/2 transform -translate-y-1/2 mx-auto w-16 h-16">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#4a9d7e]"></div>
                </div>
            </div>

            <!-- Notification Container -->
            <div id="notificationContainer" class="fixed top-5 right-5 z-50 w-96"></div>
            
            <form id="setPasswordForm" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" 
                           name="password" 
                           id="password"
                           required
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#4a9d7e]/30 focus:border-transparent focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" 
                           name="confirm_password" 
                           id="confirm_password"
                           required
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#4a9d7e]/30 focus:border-transparent focus:outline-none">
                    <div id="matchError" class="text-red-500 text-xs mt-1 hidden">Passwords do not match</div>
                </div>
                
                <div class="pt-2">
                    <button type="submit"
                            id="submitBtn"
                            class="w-full bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-6 py-2 rounded-lg shadow transition font-medium">
                        Activate Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    const csrftoken = getCookie('csrftoken');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const notificationContainer = document.getElementById('notificationContainer');
    const form = document.getElementById('setPasswordForm');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const matchError = document.getElementById('matchError');

    // Show notification
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `mb-3 p-4 rounded-lg shadow-lg transform transition-all duration-300 ${
            type === 'success' ? 'bg-green-500' : 'bg-red-500'
        } text-white`;
        notification.innerHTML = `
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        ${type === 'success' ? 
                            '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>' :
                            '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>'
                        }
                    </svg>
                    <span>${escapeHtml(message)}</span>
                </div>
                <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-white hover:text-gray-200">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        `;
        notificationContainer.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Check password match
    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (confirm.length > 0 && password !== confirm) {
            matchError.classList.remove('hidden');
            confirmInput.classList.add('border-red-500', 'bg-red-50');
            return false;
        } else {
            matchError.classList.add('hidden');
            confirmInput.classList.remove('border-red-500', 'bg-red-50');
            return true;
        }
    }

    // Real-time password validation
    confirmInput.addEventListener('input', checkPasswordMatch);
    passwordInput.addEventListener('input', function() {
        if (confirmInput.value.length > 0) {
            checkPasswordMatch();
        }
    });

    // Handle form submission with AJAX
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Validate passwords match
        if (!checkPasswordMatch()) {
            showNotification('Passwords do not match', 'error');
            return;
        }
        
        const password = passwordInput.value;
        if (password.length < 8) {
            showNotification('Password must be at least 8 characters long', 'error');
            return;
        }
        
        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        loadingOverlay.classList.remove('hidden');
        
        // Get current URL (contains uidb64 and token)
        const currentUrl = window.location.pathname;
        
        try {
            const response = await fetch(currentUrl, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    'password': password,
                    'confirm_password': password
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showNotification(data.message, 'success');
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 2000);
            } else {
                showNotification(data.message || 'Error activating account', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('An error occurred. Please try again.', 'error');
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    });
</script>

<style>
    #loadingOverlay {
        transition: all 0.3s ease;
    }
    
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
    
    .animate-spin {
        animation: spin 1s linear infinite;
    }
    
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    #notificationContainer > div {
        animation: slideIn 0.3s ease-out;
    }
    
    input:focus {
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
</style>

{% endblock %}
