{% extends "base.html" %}

{% block title %}Login · ReadyTask PMS{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        background: linear-gradient(135deg, #f6f7f9 0%, #e8ecef 100%);
    }
    .dark .login-container {
        background: linear-gradient(135deg, #0f1117 0%, #1a202c 100%);
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center login-container p-6">
    <div class="bg-white dark:bg-[#111827] w-full max-w-md rounded-2xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        
        <div class="px-8 pt-8 pb-6 text-center border-b border-slate-100 dark:border-white/10">
            <div class="flex items-center justify-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-[#4a9d7e] flex items-center justify-center">
                    <i class="fa-solid fa-check-double text-white text-xl"></i>
                </div>
                <span class="text-2xl font-semibold tracking-tight text-slate-800 dark:text-white">
                    ReadyTask
                </span>
            </div>
            <h2 class="text-xl font-semibold text-slate-700 dark:text-slate-200">Welcome back</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Sign in to continue to your workspace</p>
        </div>

        <div class="p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                        Username
                    </label>
                    <input type="text" 
                           name="username" 
                           id="username" 
                           placeholder="Enter your username"
                           class="w-full px-4 py-3 bg-[#f6f7f9] dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl focus:outline-none focus:border-[#4a9d7e] transition text-sm"
                           required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                        Password
                    </label>
                    <input type="password" 
                           name="password" 
                           id="password" 
                           placeholder="Enter your password"
                           class="w-full px-4 py-3 bg-[#f6f7f9] dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl focus:outline-none focus:border-[#4a9d7e] transition text-sm"
                           required>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 accent-[#4a9d7e]">
                        <span class="text-slate-600 dark:text-slate-400">Remember me</span>
                    </label>
                    <a href="{% url 'reset_password' %}" 
                       class="text-[#4a9d7e] hover:text-[#3d8a6d] font-medium transition">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" 
                        class="w-full bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white font-semibold py-3.5 rounded-xl transition duration-200 text-sm tracking-wide">
                    Sign In
                </button>
            </form>
        </div>

        <div class="px-8 py-5 border-t border-slate-100 dark:border-white/10 text-center">
            <p class="text-xs text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a href="#" class="text-[#4a9d7e] hover:text-[#3d8a6d] font-medium">Contact Admin</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
