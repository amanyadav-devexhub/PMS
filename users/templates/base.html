<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PMS Dashboard{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

    <!-- ================= SIDEBAR ================= -->
    <aside class="w-64 bg-white shadow-lg">

        <!-- Logo / Brand -->
        <div class="p-6 border-b">
            <h1 class="text-2xl font-bold text-orange-600">PMS</h1>
        </div>

        <!-- Navigation - JavaScript Generated (No Django session) -->
        <nav id="sidebarNav" class="p-4 space-y-2 text-gray-700">
            <div class="text-center py-4 text-gray-500 text-sm">Loading...</div>
        </nav>
    </aside>
    <!-- ================= END SIDEBAR ================= -->

    <!-- ================= MAIN AREA ================= -->
    <div class="flex-1 flex flex-col">

        <!-- Topbar -->
        <header class="bg-white shadow p-4 flex justify-between items-center">

            <h2 class="text-xl font-semibold text-gray-800">
                {% block page_title %}Dashboard{% endblock %}
            </h2>

            <div class="flex items-center space-x-4">

                <!-- Notification Bell -->
                <div class="relative cursor-pointer" id="notificationBell">
                    <span class="text-xl">🔔</span>
                    <span id="notificationCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-xs px-1 rounded-full hidden">0</span>
                </div>

                <!-- Notification Dropdown Panel -->
                <div id="notificationDropdown" class="hidden absolute right-0 mt-2 w-64 bg-white shadow-lg rounded-lg overflow-hidden z-50" style="top: 70px;">
                    <div class="p-3 border-b font-semibold text-gray-700 text-sm">Notifications</div>
                    <ul id="notificationList" class="max-h-48 overflow-y-auto">
                        <li class="p-4 text-center text-gray-500 text-xs">Loading...</li>
                    </ul>
                    <a href="#" id="viewAllNotifications" class="block p-2 bg-gray-100 text-center text-xs text-gray-700 hover:bg-gray-200">
                        View All
                    </a>
                </div>

                <!-- User Info -->
                <div class="flex items-center space-x-2">
                    <img src="https://i.pravatar.cc/40" class="rounded-full w-10 h-10" alt="User">
                    <span id="userName" class="font-medium">Loading...</span>
                </div>

                <!-- Logout Button -->
                <button onclick="logout()" class="text-red-600 hover:text-red-800 text-sm font-medium">
                    Logout
                </button>

            </div>
        </header>

        <!-- Content Area -->
        <main class="p-6 overflow-y-auto flex-1">
            {% block content %}
            <!-- Page Content Goes Here -->
            {% endblock %}
        </main>

    </div>
    <!-- ================= END MAIN AREA ================= -->

</div>

<script>
// ========== JWT CORE FUNCTIONS ==========
function getAccessToken() { return localStorage.getItem('access_token'); }
function getUserRole() { return localStorage.getItem('user_role'); }
function getUsername() { return localStorage.getItem('username'); }
function getUserEmail() { return localStorage.getItem('user_email'); }

function addTokenToUrl(url) {
    const token = getAccessToken();
    if (!token) return url;
    if (url.includes('token=')) return url;
    if (url.includes('logout') || url.includes('login')) return url;
    const separator = url.includes('?') ? '&' : '?';
    return `${url}${separator}token=${encodeURIComponent(token)}`;
}

function logout() {
    localStorage.clear();
    window.location.href = '/render_login/';
}

function extractTokenFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        localStorage.setItem('access_token', token);
        window.history.replaceState({}, document.title, window.location.pathname);
        console.log('✅ Token extracted from URL');
    }
}

// ========== SIDEBAR NAVIGATION ==========
function updateSidebar() {
    const token = getAccessToken();
    const role = getUserRole();
    const username = getUsername();
    
    const navContainer = document.getElementById('sidebarNav');
    const userNameSpan = document.getElementById('userName');
    
    if (userNameSpan && username) {
        userNameSpan.innerText = username;
    }
    
    if (!token) {
        navContainer.innerHTML = `
            <div class="text-center py-4">
                <p class="text-gray-500 text-sm">Please login</p>
                <a href="/render_login/" class="block mt-2 text-orange-600 hover:text-orange-700">Login →</a>
            </div>
        `;
        return;
    }
    
    let navHtml = '';
    
    // Dashboard link
    let dashboardUrl = '';
    if (role === 'ADMIN') {
        dashboardUrl = addTokenToUrl('/admin_dashboard/');
    } else if (role === 'TEAM_LEAD') {
        dashboardUrl = addTokenToUrl('/teamlead_dashboard/');
    } else {
        dashboardUrl = addTokenToUrl('/employee_dashboard/');
    }
    
    navHtml += `<a href="${dashboardUrl}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Dashboard</a>`;
    
    // ADMIN Menu
    if (role === 'ADMIN') {
        navHtml += `
            <a href="${addTokenToUrl('/admin-view-users/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Members</a>
            <a href="${addTokenToUrl('/view_projects/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Projects</a>
            <a href="${addTokenToUrl('/departments/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Departments</a>
            <a href="${addTokenToUrl('/designations/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Designations</a>
            <a href="${addTokenToUrl('/user-analytics/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Analytics</a>
            <div class="border-t my-2"></div>
            <a href="${addTokenToUrl('/create_user/')}" class="block px-4 py-2 rounded hover:bg-green-100 hover:text-green-600 transition">+ Create User</a>
            <a href="${addTokenToUrl('/create_project/')}" class="block px-4 py-2 rounded hover:bg-blue-100 hover:text-blue-600 transition">+ Create Project</a>
        `;
    }
    
    // TEAM LEAD Menu
    if (role === 'TEAM_LEAD') {
        navHtml += `
            <a href="${addTokenToUrl('/teamlead-view-users/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">Team Members</a>
            <a href="${addTokenToUrl('/view_projects/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">My Projects</a>
            <a href="${addTokenToUrl('/assign_task/')}" class="block px-4 py-2 rounded hover:bg-blue-100 hover:text-blue-600 transition">Assign Task</a>
            <a href="${addTokenToUrl('/create_project/')}" class="block px-4 py-2 rounded hover:bg-green-100 hover:text-green-600 transition">+ Create Project</a>
        `;
    }
    
    // EMPLOYEE Menu
    if (role === 'EMPLOYEE') {
        navHtml += `
            <a href="${addTokenToUrl('/employee_tasks/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">My Tasks</a>
            <a href="${addTokenToUrl('/employee_projects/')}" class="block px-4 py-2 rounded hover:bg-orange-100 hover:text-orange-600 transition">My Projects</a>
        `;
    }
    
    navContainer.innerHTML = navHtml;
}

// ========== PROCESS LINKS AND FORMS ==========
function addTokenToAllLinks() {
    const token = getAccessToken();
    if (!token) return;
    
    document.querySelectorAll('main a[href^="/"]').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.includes('token=') && !href.includes('logout')) {
            link.setAttribute('href', addTokenToUrl(href));
        }
    });
}

function addTokenToAllForms() {
    const token = getAccessToken();
    if (!token) return;
    
    document.querySelectorAll('main form').forEach(form => {
        const action = form.getAttribute('action');
        if (action && !action.includes('token=') && !action.includes('logout')) {
            form.setAttribute('action', addTokenToUrl(action));
        }
        const csrfInput = form.querySelector('input[name="csrfmiddlewaretoken"]');
        if (csrfInput) csrfInput.remove();
    });
}

// ========== INITIALIZATION ==========
document.addEventListener('DOMContentLoaded', function() {
    extractTokenFromUrl();
    updateSidebar();
    setTimeout(() => {
        addTokenToAllLinks();
        addTokenToAllForms();
    }, 100);
});

// Notification dropdown
const bell = document.getElementById('notificationBell');
const dropdown = document.getElementById('notificationDropdown');
if (bell && dropdown) {
    bell.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
    });
    document.addEventListener('click', (event) => {
        if (!bell.contains(event.target) && !dropdown.contains(event.target)) {
            dropdown.classList.add('hidden');
        }
    });
}
</script>

</body>
</html>
