{% extends "base.html" %}
{% block title %}User Detail - ReadyTask PMS{% endblock %}
{% block page_title %}Member Details{% endblock %}
{% block content %}

<div class="max-w-5xl mx-auto">
  <!-- Back Button -->
  <div class="mb-6">
    <button onclick="goBack()" class="back-btn-small">
      <i class="fa-solid fa-arrow-left"></i>
      Back
    </button>
  </div>

  <!-- Loading State -->
  <div id="loadingState" class="flex justify-center items-center py-20">
    <div
      class="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-[#4a9d7e]"
    ></div>
    <span class="ml-4 text-slate-500 dark:text-slate-400"
      >Loading user details...</span
    >
  </div>

  <!-- Content Container - Hidden until loaded -->
  <div id="contentContainer" class="space-y-6 hidden"></div>
</div>

<!-- Edit Profile Modal (Only for own profile) -->
<div
  id="editProfileModal"
  class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto z-50"
>
  <div
    class="relative top-20 mx-auto max-w-md bg-white dark:bg-[#1e2937] rounded-lg shadow-lg p-6"
  >
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold text-slate-800 dark:text-white">
        Edit My Information
      </h3>
      <button
        onclick="closeEditModal()"
        class="text-gray-400 hover:text-gray-600 text-2xl"
      >
        &times;
      </button>
    </div>

    <form id="editProfileForm" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="hidden" name="self_edit" value="1" />

      <div class="mb-4">
        <label
          class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1"
          >Profile Image</label
        >
        <input
          type="file"
          name="profile_image"
          accept="image/*"
          class="w-full border border-gray-300 dark:border-white/10 rounded-lg px-3 py-2 bg-white dark:bg-[#111827] text-slate-800 dark:text-slate-200"
        />
        <p class="text-xs text-gray-400 mt-1">
          Upload JPG, PNG, or GIF (max 5MB)
        </p>
      </div>

      <div class="mb-4">
        <label
          class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone"
          id="modal_phone"
          class="w-full border border-gray-300 dark:border-white/10 rounded-lg px-3 py-2 bg-white dark:bg-[#111827] text-slate-800 dark:text-slate-200"
        />
      </div>

      <div class="mb-4">
        <label
          class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1"
          >Emergency Contact</label
        >
        <input
          type="text"
          name="emergency_contact"
          id="modal_emergency"
          class="w-full border border-gray-300 dark:border-white/10 rounded-lg px-3 py-2 bg-white dark:bg-[#111827] text-slate-800 dark:text-slate-200"
        />
      </div>

      <div class="mb-4">
        <label
          class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1"
          >Address</label
        >
        <textarea
          name="address"
          id="modal_address"
          rows="3"
          class="w-full border border-gray-300 dark:border-white/10 rounded-lg px-3 py-2 bg-white dark:bg-[#111827] text-slate-800 dark:text-slate-200"
        ></textarea>
      </div>

      <div class="flex justify-end gap-2">
        <button
          type="button"
          onclick="closeEditModal()"
          class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-4 py-2 rounded-lg transition"
        >
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  // Store current user ID for comparison
  const currentLoggedInUserId = {{ request.user.id|default:0 }};
  const viewingUserId = {{ user_id|default:0 }};
  const isOwnProfile = (currentLoggedInUserId !== 0 && currentLoggedInUserId === viewingUserId);

  // Store fetched data for modal use
  let fetchedProfileData = null;

  function escapeHtml(text) {
      if (text === null || text === undefined || text === '') return '—';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
  }

  // Template for user details - properly injects all data from AJAX response
  function createUserTemplate(data) {
      const u = data.user;
      const p = data.profile;
      const a = data.analytics;

      // Edit button: own profile = modal edit, other = link to edit page
      const editButtonHtml = isOwnProfile ?
          `<button onclick="openEditModal()"
              class="bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-6 py-2.5 rounded-xl font-medium flex items-center gap-2 transition">
              <i class="fa-solid fa-pen text-sm"></i>
              Edit My Info
          </button>` :
          `<a href="/user/${u.id}/edit/" class="bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-6 py-2.5 rounded-xl font-medium flex items-center gap-2 transition">
              <i class="fa-solid fa-pen text-sm"></i>
              Edit Profile
          </a>`;

      // Avatar with profile image support
      const avatarHtml = p.profile_image ?
          `<img src="${escapeHtml(p.profile_image)}" alt="Profile" class="w-28 h-28 rounded-full object-cover border-4 border-[#4a9d7e]/30">` :
          `<div class="w-28 h-28 bg-[#eef6f2] dark:bg-[#4a9d7e]/20 rounded-full flex items-center justify-center text-4xl font-bold text-[#4a9d7e] border-4 border-[#4a9d7e]/30">
              ${u.username ? u.username.charAt(0).toUpperCase() : '?'}
          </div>`;

      const statusBadge = u.is_active
          ? '<span class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold">Active</span>'
          : '<span class="inline-block bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-semibold">Inactive</span>';

      return `
      <!-- TOP PROFILE CARD -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-6 flex flex-col sm:flex-row gap-6 items-center">
          <div class="flex-shrink-0">${avatarHtml}</div>
          <div class="flex-1 min-w-0">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                  <div>
                      <h1 class="text-3xl font-semibold text-slate-800 dark:text-white">${escapeHtml(u.full_name)}</h1>
                      <p class="text-slate-500 dark:text-slate-400 mt-1 text-lg">${escapeHtml(p.designation)} — ${escapeHtml(p.department)}</p>
                  </div>
                  ${editButtonHtml}
              </div>
              <div class="flex flex-wrap gap-x-8 gap-y-3 mt-6 text-sm">
                  <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
                      <i class="fa-solid fa-envelope text-[#4a9d7e]"></i>
                      <span>${escapeHtml(u.email)}</span>
                  </div>
                  <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
                      <i class="fa-solid fa-phone text-[#4a9d7e]"></i>
                      <span>${escapeHtml(p.phone)}</span>
                  </div>
                  <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
                      <i class="fa-solid fa-calendar text-[#4a9d7e]"></i>
                      Joined ${escapeHtml(u.date_joined)}
                  </div>
                  <div>${statusBadge}</div>
              </div>
          </div>
      </div>

      <!-- PERFORMANCE ANALYTICS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-chart-bar text-[#4a9d7e]"></i>
              Performance Analytics
          </h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
              <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-4 text-center">
                  <p class="text-2xl font-bold text-blue-600 dark:text-blue-400">${a.projects_assigned}</p>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Projects</p>
              </div>
              <div class="bg-amber-50 dark:bg-amber-900/20 rounded-xl p-4 text-center">
                  <p class="text-2xl font-bold text-amber-600 dark:text-amber-400">${a.tasks_assigned}</p>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Total Tasks</p>
              </div>
              <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-4 text-center">
                  <p class="text-2xl font-bold text-green-600 dark:text-green-400">${a.completed_tasks}</p>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Completed</p>
              </div>
              <div class="bg-purple-50 dark:bg-purple-900/20 rounded-xl p-4 text-center">
                  <p class="text-2xl font-bold text-purple-600 dark:text-purple-400">${a.performance}%</p>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Performance</p>
              </div>
          </div>
      </div>

      <!-- BASIC DETAILS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-user text-[#4a9d7e]"></i>
              Basic Details
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Employee ID</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.employee_id)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Phone</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.phone)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Department</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.department)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Designation</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.designation)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Role</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(u.role)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Date of Joining</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.date_of_joining)}</p>
              </div>
          </div>
      </div>

      <!-- SALARY DETAILS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-money-bill-wave text-[#4a9d7e]"></i>
              Salary Details
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Cost to Company (CTC)</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.ctc)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Salary in Hand</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.salary_in_hand)}</p>
              </div>
          </div>
      </div>

      <!-- BANK DETAILS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-building-columns text-[#4a9d7e]"></i>
              Bank Details
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Bank Name</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.bank_name)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Account Number</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.account_no)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">IFSC Code</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.ifsc)}</p>
              </div>
          </div>
      </div>

      <!-- VERIFICATION DETAILS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-id-card text-[#4a9d7e]"></i>
              Verification Details
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Aadhar Number</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.aadhar_no)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">PAN Number</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.pan_no)}</p>
              </div>
          </div>
      </div>

      <!-- ADDITIONAL DETAILS -->
      <div class="bg-white dark:bg-[#1e2937] rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-8">
          <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
              <i class="fa-solid fa-circle-info text-[#4a9d7e]"></i>
              Additional Details
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Emergency Contact</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1">${escapeHtml(p.emergency_contact)}</p>
              </div>
              <div>
                  <p class="text-slate-500 dark:text-slate-400">Address</p>
                  <p class="font-medium text-slate-700 dark:text-slate-200 mt-1 whitespace-pre-line">${escapeHtml(p.address)}</p>
              </div>
          </div>
      </div>
      `;
  }

  function openEditModal() {
      if (!fetchedProfileData) return;
      const p = fetchedProfileData.profile;

      document.getElementById('modal_phone').value = (p.phone && p.phone !== '—') ? p.phone : '';
      document.getElementById('modal_emergency').value = (p.emergency_contact && p.emergency_contact !== '—') ? p.emergency_contact : '';
      document.getElementById('modal_address').value = (p.address && p.address !== '—') ? p.address : '';

      document.getElementById('editProfileModal').classList.remove('hidden');
  }

  function closeEditModal() {
      document.getElementById('editProfileModal').classList.add('hidden');
  }

  function goBack() {
      window.history.back();
  }

  // Handle self-edit form submission via AJAX
  document.getElementById('editProfileForm')?.addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);

      fetch(window.location.href, {
          method: 'POST',
          headers: {
              'X-Requested-With': 'XMLHttpRequest'
          },
          body: formData
      })
      .then(response => response.json())
      .then(data => {
          if (data.success) {
              alert(data.message || 'Profile updated successfully!');
              location.reload();
          } else {
              const errors = data.errors || {};
              const msgs = Object.values(errors).flat().join('\n');
              alert(msgs || data.error || 'Error updating profile');
          }
      })
      .catch(error => {
          console.error('Error:', error);
          alert('Network error. Please try again.');
      });
  });

  function loadUserDetails() {
      const loadingState = document.getElementById('loadingState');
      const contentContainer = document.getElementById('contentContainer');

      console.log('ReadyTask Debug: Loading user details for ID:', {{ user_id }});
      const token = localStorage.getItem('access_token');
      
      fetch(`/api/users/${viewingUserId}/`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
         }
     })
      .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
      })
      .then(data => {
          if (data.success) {
              console.log('ReadyTask Debug: Successfully fetched user data:', data);
              fetchedProfileData = data;
              loadingState.classList.add('hidden');
              contentContainer.classList.remove('hidden');
              contentContainer.innerHTML = createUserTemplate(data);
          } else {
              throw new Error('Server returned unsuccessful response');
          }
      })
      .catch(error => {
          console.error('Error loading user details:', error);
          loadingState.innerHTML = `
              <div class="text-center flex flex-col items-center">
                  <i class="fa-solid fa-circle-exclamation text-4xl text-red-500 mb-3"></i>
                  <p class="text-red-500 font-medium">Error loading user details</p>
                  <p class="text-slate-400 text-sm mt-1">${error.message}</p>
                  <button onclick="loadUserDetails()" class="mt-4 bg-[#4a9d7e] hover:bg-[#3d8a6d] text-white px-4 py-2 rounded-lg transition">
                      <i class="fa-solid fa-rotate-right mr-2"></i> Retry
                  </button>
              </div>`;
      });
  }

  // Load on page ready
  document.addEventListener('DOMContentLoaded', loadUserDetails);
</script>

{% endblock %}
