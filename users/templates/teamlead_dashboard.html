{% extends "base.html" %}

{% block title %}Team Lead Dashboard{% endblock %}

{% block content %}
<div class="container mt-5">
    <!-- Dashboard Header -->
    <div class="dashboard-header text-center">
        <h1>Team Lead Dashboard</h1>
        <p>Manage your team efficiently and assign tasks!</p>
    </div>

    <!-- Dashboard Cards -->
    <div class="card-container mt-5 d-flex flex-wrap justify-content-center gap-4">
        {% if request.user.role == "TEAM_LEAD" %}
        <div class="dashboard-card">
            <a href="{% url 'assign_task' %}">Assign Task</a>
        </div>
        <div class="dashboard-card">
            <a href="{% url 'create_project' %}">Create Project</a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'teamlead_view_users' %}">View Employees</a>
        </div>
        <!-- Add more cards as needed -->
        {% endif %}
    </div>
</div>

<!-- Optional: Add some custom card styling -->
<style>
.dashboard-header {
    background: linear-gradient(to right, #0d6efd, #6610f2);
    color: white;
    padding: 30px 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    margin-bottom: 30px;
}

.card-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.dashboard-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    width: 220px;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.dashboard-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.dashboard-card a {
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    color: #0d6efd;
    transition: color 0.3s;
}

.dashboard-card a:hover {
    color: #6610f2;
}
</style>
{% endblock %}
