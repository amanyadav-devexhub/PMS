{% extends "base.html" %}

{% block title %}Members{% endblock %}
{% block page_title %}Members{% endblock %}

{% block content %}

<div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-semibold text-gray-800">All Members</h2>

    <div class="flex items-center space-x-3">
        <!-- Add Member Button -->
        <a href="{% url 'create_user' %}"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition duration-200 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Member
        </a>


        <!-- Search Section -->
        <div class="flex items-center space-x-2">
            <input type="text" id="searchInput" name="search" placeholder="Search username or role..."
                class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent">

            <button id="searchBtn" type="button" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                Search
            </button>

            <button id="clearBtn" type="button"
                class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition hidden">
                Clear
            </button>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-1/2 transform -translate-y-1/2 mx-auto w-16 h-16">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
    </div>
</div>

<!-- Notification Container -->
<div id="notificationContainer" class="fixed top-5 right-5 z-50 w-96"></div>

<div class="bg-white shadow rounded-lg overflow-hidden">
    <table class="min-w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-600">
            <tr>
                <th class="px-6 py-4">#</th>
                <th class="px-6 py-4">Username</th>
                <th class="px-6 py-4">Role</th>
                <th class="px-6 py-4">Status</th>
                <th class="px-6 py-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="usersTableBody" class="divide-y">
            <tr>
                <td colspan="5" class="px-6 py-6 text-center text-gray-500">
                    <div class="flex justify-center items-center">
                        <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-indigo-600 mr-2">
                        </div>
                        Loading users...
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div class="mt-4 flex justify-between items-center">
    <div class="text-sm text-gray-500" id="showingInfo">
        Showing 0 members
    </div>

    <div class="flex gap-2 items-center">
        <!-- Page Size Selector -->
        <select id="pageSizeSelect" class="border border-gray-300 rounded px-2 py-1 text-sm mr-4">
            <option value="10">10 per page</option>
            <option value="25">25 per page</option>
            <option value="50">50 per page</option>
            <option value="100">100 per page</option>
        </select>

        <!-- Pagination Buttons -->
        <button id="prevPageBtn"
            class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 text-sm disabled:opacity-50 disabled:cursor-not-allowed transition"
            disabled>
            ← Prev
        </button>

        <span id="pageIndicator" class="text-sm text-gray-600 mx-2">
            Page 1 of 1
        </span>

        <button id="nextPageBtn"
            class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 text-sm disabled:opacity-50 disabled:cursor-not-allowed transition"
            disabled>
            Next →
        </button>
    </div>
</div>

<script>
    // Get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    const csrftoken = getCookie('csrftoken');

    // Loading overlay
    const loadingOverlay = document.getElementById('loadingOverlay');
    const notificationContainer = document.getElementById('notificationContainer');

    // Pagination variables
    let currentPage = 1;
    let currentPageSize = 10;
    let currentSearchQuery = '';

    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `mb-3 p-4 rounded-lg shadow-lg transform transition-all duration-300 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'
            } text-white`;
        notification.innerHTML = `
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    ${type === 'success' ?
                '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>' :
                '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>'
            }
                </svg>
                <span>${escapeHtml(message)}</span>
            </div>
            <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-white hover:text-gray-200">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
            </button>
        </div>
    `;
        notificationContainer.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function loadUsers(search = '', page = 1, pageSize = 10) {
        loadingOverlay.classList.remove('hidden');

        const url = new URL(window.location.href);
        if (search) {
            url.searchParams.set('search', search);
        } else {
            url.searchParams.delete('search');
        }
        url.searchParams.set('page', page);
        url.searchParams.set('page_size', pageSize);

        fetch(url, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    currentPage = data.current_page;
                    currentPageSize = data.page_size;
                    currentSearchQuery = data.search_query;

                    renderUsers(data.users);
                    updatePaginationUI(data);
                    
                    // Update showing info
                    const startIndex = (data.current_page - 1) * data.page_size + 1;
                    const endIndex = Math.min(data.current_page * data.page_size, data.total);
                    const showingInfo = document.getElementById('showingInfo');
                    if (showingInfo) {
                        showingInfo.innerHTML = `Showing ${startIndex} - ${endIndex} of ${data.total} members`;
                    }

                    // Update clear button visibility
                    const clearBtn = document.getElementById('clearBtn');
                    if (data.search_query) {
                        clearBtn.classList.remove('hidden');
                    } else {
                        clearBtn.classList.add('hidden');
                    }
                }
                loadingOverlay.classList.add('hidden');
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('Error loading users. Please try again.', 'error');
                loadingOverlay.classList.add('hidden');
            });
    }

    function updatePaginationUI(data) {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        if (prevBtn) {
            prevBtn.disabled = !data.has_previous;
            if (data.has_previous) {
                prevBtn.onclick = () => loadUsers(currentSearchQuery, data.previous_page_number, currentPageSize);
            }
        }

        if (nextBtn) {
            nextBtn.disabled = !data.has_next;
            if (data.has_next) {
                nextBtn.onclick = () => loadUsers(currentSearchQuery, data.next_page_number, currentPageSize);
            }
        }

        if (pageIndicator) {
            pageIndicator.textContent = `Page ${data.current_page} of ${data.total_pages}`;
        }
    }

    function renderUsers(users) {
        const tbody = document.getElementById('usersTableBody');

        if (!users || users.length === 0) {
            tbody.innerHTML = `
            <tr>
                <td colspan="5" class="px-6 py-6 text-center text-gray-500">
                    No members found
                </td>
            </tr>
        `;
            return;
        }

        let html = '';
        users.forEach((user, index) => {
            const counter = (currentPage - 1) * currentPageSize + index + 1;
            const statusHtml = user.is_active
                ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-medium">Active</span>'
                : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-medium">Inactive</span>';

            html += `
            <tr class="hover:bg-gray-50" id="user-row-${user.id}">
                <td class="px-6 py-4">
                    ${counter}
                </td>
                <td class="px-6 py-4 font-medium text-gray-800">
                    ${escapeHtml(user.username)}
                </td>
                <td class="px-6 py-4">
                    <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${user.role_class}">
                        ${escapeHtml(user.role_display)}
                    </span>
                </td>
                <td class="px-6 py-4">
                    ${statusHtml}
                </td>
                <td class="px-6 py-4 text-right space-x-2">
                    <a href="${user.view_url}"
                       class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded text-xs shadow">
                        View
                    </a>
                    <button type="button"
                       onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')"
                       class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded text-xs shadow">
                        Delete
                    </button>
                </td>
            </tr>
        `;
        });

        tbody.innerHTML = html;
    }

    // Delete user function
    function deleteUser(userId, username) {
        if (!confirm(`Are you sure you want to delete user "${username}"?`)) return;

        loadingOverlay.classList.remove('hidden');

        fetch(`/user/${userId}/delete/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(data.message, 'success');
                    // Reload users list with current page
                    loadUsers(currentSearchQuery, currentPage, currentPageSize);
                } else {
                    showNotification(data.error || 'Error deleting user', 'error');
                }
                loadingOverlay.classList.add('hidden');
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('Network error. Please try again.', 'error');
                loadingOverlay.classList.add('hidden');
            });
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const pageSizeSelect = document.getElementById('pageSizeSelect');

        // Load initial users
        loadUsers('', 1, 10);

        // Search button click
        if (searchBtn) {
            searchBtn.addEventListener('click', function () {
                const searchValue = searchInput.value.trim();
                currentSearchQuery = searchValue;
                loadUsers(searchValue, 1, currentPageSize);
            });
        }

        // Clear button click
        if (clearBtn) {
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                currentSearchQuery = '';
                loadUsers('', 1, currentPageSize);
            });
        }

        // Enter key in search input
        if (searchInput) {
            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    const searchValue = searchInput.value.trim();
                    currentSearchQuery = searchValue;
                    loadUsers(searchValue, 1, currentPageSize);
                }
            });
        }

        // Page size change
        if (pageSizeSelect) {
            pageSizeSelect.addEventListener('change', function () {
                currentPageSize = parseInt(this.value);
                loadUsers(currentSearchQuery, 1, currentPageSize);
            });
        }
    });
</script>

<style>
    #loadingOverlay {
        transition: all 0.3s ease;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .animate-spin {
        animation: spin 1s linear infinite;
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }

        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    #notificationContainer>div {
        animation: slideIn 0.3s ease-out;
    }
</style>

{% endblock %}
