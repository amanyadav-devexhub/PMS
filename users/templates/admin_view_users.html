{% extends "base.html" %}

{% block title %}Team Members{% endblock %}
{% block page_title %}Team Members{% endblock %}

{% block content %}

<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <h2 class="text-lg font-semibold text-slate-800 dark:text-white">All Team Members</h2>

    <div class="flex flex-wrap items-center gap-3">
        <!-- Add Member Button -->
        {% if can_add_user %}
        <a href="{% url 'create_user' %}"
           class="inline-flex items-center gap-2 px-3 py-[7px] text-[13px] font-medium text-white bg-brand-primary hover:bg-[#3d8a6d] rounded-md transition shadow-sm">
            <i class="fa-solid fa-plus text-[10px]"></i>
            Add Member
        </a>
        {% endif %}

        <!-- Search Section -->
        <div class="flex items-center gap-2">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                <input type="text" id="searchInput" name="search" placeholder="Search username or role..."
                       class="pl-7 pr-3 py-[7px] bg-[#f6f7f9] dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-md text-[13px] outline-none focus:border-brand-primary w-48 md:w-64 transition">
            </div>
            <button id="searchBtn" type="button"
                    class="px-3 py-[7px] text-[13px] font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-md hover:bg-slate-50 dark:hover:bg-white/10 transition">
                Search
            </button>
            <button id="clearBtn" type="button"
                    class="px-3 py-[7px] text-[13px] font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-md hover:bg-slate-50 dark:hover:bg-white/10 transition hidden">
                Clear
            </button>
        </div>
    </div>
</div>

<!-- Loading Overlay (Matches base pattern) -->
<div id="loadingOverlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center">
    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-brand-primary"></div>
</div>

<!-- Users Table -->
<div class="bg-white dark:bg-[#111827] rounded-lg border border-slate-200 dark:border-white/10 overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-left">
            <thead class="bg-[#f6f7f9] dark:bg-white/5 text-slate-600 dark:text-slate-400 border-b border-slate-200 dark:border-white/10">
                <tr>
                    <th class="px-6 py-3 text-xs font-medium">#</th>
                    <th class="px-6 py-3 text-xs font-medium">Username</th>
                    <th class="px-6 py-3 text-xs font-medium">Role</th>
                    <th class="px-6 py-3 text-xs font-medium">Status</th>
                    <th class="px-6 py-3 text-xs font-medium text-right">Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody" class="divide-y divide-slate-100 dark:divide-white/5">
                <tr>
                    <td colspan="5" class="px-6 py-8 text-center text-slate-500 dark:text-slate-400 text-sm">
                        <div class="flex justify-center items-center gap-2">
                            <div class="animate-spin rounded-full h-5 w-5 border-t-2 border-b-2 border-brand-primary"></div>
                            Loading users...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination Section -->
<div class="mt-4 flex flex-col sm:flex-row justify-between items-center gap-3 text-sm">
    <div class="text-slate-500 dark:text-slate-400 text-xs" id="showingInfo">
        Showing 0 members
    </div>

    <div class="flex items-center gap-3">
        <!-- Page Size Selector -->
        <select id="pageSizeSelect" class="bg-white dark:bg-[#111827] border border-slate-200 dark:border-white/10 rounded-md px-2 py-1 text-xs outline-none focus:border-brand-primary">
            <option value="10">10 per page</option>
            <option value="25">25 per page</option>
            <option value="50">50 per page</option>
            <option value="100">100 per page</option>
        </select>

        <!-- Pagination Buttons -->
        <div class="flex items-center gap-1">
            <button id="prevPageBtn"
                    class="px-3 py-1 rounded-md bg-white dark:bg-[#111827] border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 text-xs hover:bg-slate-50 dark:hover:bg-white/5 transition disabled:opacity-40 disabled:cursor-not-allowed"
                    disabled>
                ← Prev
            </button>
            <span id="pageIndicator" class="text-xs text-slate-600 dark:text-slate-400 mx-2 min-w-[80px] text-center">
                Page 1 of 1
            </span>
            <button id="nextPageBtn"
                    class="px-3 py-1 rounded-md bg-white dark:bg-[#111827] border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 text-xs hover:bg-slate-50 dark:hover:bg-white/5 transition disabled:opacity-40 disabled:cursor-not-allowed"
                    disabled>
                Next →
            </button>
        </div>
    </div>
</div>

<script>
    // Permission flags from context processor
    const canDeleteUser = {{ can_delete_user|yesno:"true,false" }};
    const canChangeUser = {{ can_change_user|yesno:"true,false" }};

    // Pagination variables
    let currentPage = 1;
    let currentPageSize = 10;
    let currentSearchQuery = '';

    // Helper: Show notification using base's toast pattern
    function showNotification(message, type = 'success') {
        // Create a toast element matching base.html style
        const toast = document.createElement('div');
        toast.className = `fixed bottom-5 right-5 z-50 bg-white dark:bg-[#1e293b] border border-slate-200 dark:border-white/10 rounded-lg shadow-lg px-4 py-3 flex items-center gap-3 toast-notification`;
        toast.innerHTML = `
            <div class="flex items-center gap-2">
                <i class="fa-solid ${type === 'success' ? 'fa-circle-check text-green-500' : 'fa-circle-exclamation text-red-500'} text-sm"></i>
                <span class="text-sm text-slate-700 dark:text-slate-300">${escapeHtml(message)}</span>
            </div>
            <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition">
                <i class="fa-solid fa-xmark text-xs"></i>
            </button>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 'csrftoken'.length + 1) === ('csrftoken=')) {
                    cookieValue = decodeURIComponent(cookie.substring('csrftoken'.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function loadUsers(search = '', page = 1, pageSize = 10) {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.remove('hidden');

        const url = new URL(window.location.href);
        if (search) url.searchParams.set('search', search);
        else url.searchParams.delete('search');
        url.searchParams.set('page', page);
        url.searchParams.set('page_size', pageSize);

        fetch(url, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                currentPage = data.current_page;
                currentPageSize = data.page_size;
                currentSearchQuery = data.search_query;
                renderUsers(data.users);
                updatePaginationUI(data);
                
                // Update showing info
                const startIndex = (data.current_page - 1) * data.page_size + 1;
                const endIndex = Math.min(data.current_page * data.page_size, data.total);
                const showingInfo = document.getElementById('showingInfo');
                if (showingInfo) {
                    showingInfo.innerHTML = `Showing ${startIndex} - ${endIndex} of ${data.total} members`;
                }

                // Toggle clear button
                const clearBtn = document.getElementById('clearBtn');
                if (data.search_query) clearBtn.classList.remove('hidden');
                else clearBtn.classList.add('hidden');
            }
            loadingOverlay.classList.add('hidden');
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification('Error loading users. Please try again.', 'error');
            loadingOverlay.classList.add('hidden');
        });
    }

    function updatePaginationUI(data) {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        if (prevBtn) {
            prevBtn.disabled = !data.has_previous;
            if (data.has_previous) {
                prevBtn.onclick = () => loadUsers(currentSearchQuery, data.previous_page_number, currentPageSize);
            }
        }

        if (nextBtn) {
            nextBtn.disabled = !data.has_next;
            if (data.has_next) {
                nextBtn.onclick = () => loadUsers(currentSearchQuery, data.next_page_number, currentPageSize);
            }
        }

        if (pageIndicator) {
            pageIndicator.textContent = `Page ${data.current_page} of ${data.total_pages}`;
        }
    }

    function renderUsers(users) {
        const tbody = document.getElementById('usersTableBody');
        if (!users || users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500 dark:text-slate-400 text-sm">No members found</td></tr>`;
            return;
        }

        let html = '';
        users.forEach((user, index) => {
            const counter = (currentPage - 1) * currentPageSize + index + 1;
            const statusHtml = user.is_active
                ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">Active</span>'
                : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400">Inactive</span>';

            html += `
            <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition" id="user-row-${user.id}">
                <td class="px-6 py-3 text-slate-600 dark:text-slate-400 text-xs">${counter}</td>
                <td class="px-6 py-3 font-medium text-slate-800 dark:text-white text-sm">${escapeHtml(user.username)}</td>
                <td class="px-6 py-3">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium ${user.role_class}">
                        ${escapeHtml(user.role_display)}
                    </span>
                </td>
                <td class="px-6 py-3">${statusHtml}</td>
                <td class="px-6 py-3 text-right">
                    <div class="flex items-center justify-end gap-2">
                        <a href="${user.view_url}"
                           class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/10 transition">
                            <i class="fa-regular fa-eye text-[10px]"></i> View
                        </a>
                        ${canDeleteUser ? `
                        <button type="button"
                                onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')"
                                class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-white dark:bg-white/5 border border-red-200 dark:border-red-900/30 text-xs text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                            <i class="fa-regular fa-trash-can text-[10px]"></i> Delete
                        </button>
                        ` : ''}
                    </div>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    // Delete user function
    function deleteUser(userId, username) {
        if (!confirm(`Are you sure you want to delete user "${username}"? This action cannot be undone.`)) return;

        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.remove('hidden');

        fetch(`/user/${userId}/delete/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCSRFToken(),
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showNotification(data.message, 'success');
                loadUsers(currentSearchQuery, currentPage, currentPageSize);
            } else {
                if (data.error && data.error.includes('permission')) {
                    window.showAccessDeniedModal ? window.showAccessDeniedModal(data.error) : showNotification(data.error, 'error');
                } else {
                    showNotification(data.error || 'Error deleting user', 'error');
                }
            }
            loadingOverlay.classList.add('hidden');
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification('Network error. Please try again.', 'error');
            loadingOverlay.classList.add('hidden');
        });
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const pageSizeSelect = document.getElementById('pageSizeSelect');

        loadUsers('', 1, 10);

        if (searchBtn) {
            searchBtn.addEventListener('click', function () {
                loadUsers(searchInput.value.trim(), 1, currentPageSize);
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                loadUsers('', 1, currentPageSize);
            });
        }

        if (searchInput) {
            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') loadUsers(searchInput.value.trim(), 1, currentPageSize);
            });
        }

        if (pageSizeSelect) {
            pageSizeSelect.addEventListener('change', function () {
                loadUsers(currentSearchQuery, 1, parseInt(this.value));
            });
        }
    });
</script>

{% endblock %}
