<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | PMS</title>

<style>
    * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #f4f6fb 0%, #e9eef5 100%);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        width: 100%;
        max-width: 400px;
        background: #ffffff;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
    }

    .login-container:hover {
        transform: translateY(-4px);
    }

    .login-container h2 {
        margin: 0 0 8px;
        text-align: center;
        font-weight: 700;
        font-size: 28px;
        color: #1f2937;
    }

    .login-subtitle {
        text-align: center;
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 32px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #374151;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        font-size: 14px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        transition: all 0.2s ease;
        background: #fafbfc;
    }

    input:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        background: #ffffff;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    .error-message {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
        display: none;
        animation: fadeIn 0.3s ease;
    }

    .error-message.show {
        display: block;
    }

    .error-message.error {
        background-color: #fee2e2;
        color: #dc2626;
        border-left: 4px solid #dc2626;
    }

    .error-message.info {
        background-color: #fef3c7;
        color: #d97706;
        border-left: 4px solid #d97706;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loading-text {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .forgot-password {
        text-align: center;
        margin-top: 24px;
    }

    .forgot-password a {
        color: #f97316;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
    }

    .forgot-password a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="login-container">
    <h2>Welcome back</h2>
    <p class="login-subtitle">Sign in to your account</p>

    <form id="loginForm">
        {% csrf_token %}

        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password">
        </div>

        <button type="submit" id="loginBtn">
            <span id="btnText">Sign In</span>
        </button>

        <div id="error" class="error-message"></div>
    </form>

    <div class="forgot-password">
        <a href="{% url 'reset_password' %}">Forgot password?</a>
    </div>
</div>

<script>
const form = document.getElementById("loginForm");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const errorDiv = document.getElementById("error");
const loginBtn = document.getElementById("loginBtn");
const btnText = document.getElementById("btnText");

function getCSRFToken() {
    return document.cookie
        .split("; ")
        .find(row => row.startsWith("csrftoken="))
        ?.split("=")[1];
}

function showLoading() {
    loginBtn.disabled = true;
    btnText.innerHTML = '<span class="loading-text"><span class="spinner"></span>Signing in...</span>';
}

function hideLoading() {
    loginBtn.disabled = false;
    btnText.innerHTML = 'Sign In';
}

function showError(message, type = "error") {
    errorDiv.textContent = message;
    errorDiv.className = `error-message show ${type}`;
    
    // Auto-hide after 5 seconds
    setTimeout(() => {
        errorDiv.classList.remove("show");
    }, 5000);
}

function clearError() {
    errorDiv.classList.remove("show");
}

form.addEventListener("submit", function (event) {
    event.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    // Client-side validation
    if (!email) {
        showError("Email is required", "error");
        emailInput.focus();
        return;
    }

    if (!password) {
        showError("Password is required", "error");
        passwordInput.focus();
        return;
    }

    // Email format validation
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showError("Please enter a valid email address", "error");
        emailInput.focus();
        return;
    }

    clearError();
    showLoading();

    fetch("/ajax_login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken(),
        },
        body: JSON.stringify({ email, password }),
    })
    .then(res => res.json())
    .then(data => {
        hideLoading();
        
        if (data.status === "success") {
            // Show success briefly before redirect
            showError(`Welcome back, ${data.username}! Redirecting...`, "info");
            
            setTimeout(() => {
                if (data.role === "ADMIN") {
                    window.location.href = "/admin_dashboard/";
                } else if (data.role === "TEAM_LEAD") {
                    window.location.href = "/teamlead_dashboard/";
                } else {
                    window.location.href = "/employee_dashboard/";
                }
            }, 800);
        } else {
            showError(data.error || "Login failed", "error");
        }
    })
    .catch(() => {
        hideLoading();
        showError("Server error. Please try again later.", "error");
    });
});

// Clear error on input
emailInput.addEventListener("input", clearError);
passwordInput.addEventListener("input", clearError);

// Enter key support
passwordInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        form.dispatchEvent(new Event("submit"));
    }
});
</script>
</body>
</html>
