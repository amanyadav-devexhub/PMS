<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | PMS</title>

<style>
    * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #f4f6fb 0%, #e9eef5 100%);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .reset-container {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
    }

    .reset-container:hover {
        transform: translateY(-4px);
    }

    .reset-container h2 {
        margin: 0 0 8px;
        text-align: center;
        font-weight: 700;
        font-size: 28px;
        color: #1f2937;
    }

    .reset-subtitle {
        text-align: center;
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 32px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #374151;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        font-size: 14px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        transition: all 0.2s ease;
        background: #fafbfc;
    }

    input:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        background: #ffffff;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    .message {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
        display: none;
        animation: fadeIn 0.3s ease;
    }

    .message.show {
        display: block;
    }

    .message.error {
        background-color: #fee2e2;
        color: #dc2626;
        border-left: 4px solid #dc2626;
    }

    .message.success {
        background-color: #d1fae5;
        color: #059669;
        border-left: 4px solid #059669;
    }

    .message.info {
        background-color: #fef3c7;
        color: #d97706;
        border-left: 4px solid #d97706;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loading-text {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .back-link {
        text-align: center;
        margin-top: 24px;
    }

    .back-link a {
        color: #f97316;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    .contact-admin {
        text-align: center;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #e2e8f0;
        font-size: 12px;
        color: #6b7280;
    }

    .contact-admin strong {
        color: #f97316;
    }
</style>
</head>

<body>

<div class="reset-container">
    <h2>Reset Password</h2>
    <p class="reset-subtitle">Enter your email and we'll send you a reset link</p>

    <form id="resetForm" method="post" action="{% url 'reset_password' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <button type="submit" id="resetBtn">
            <span id="btnText">Send Reset Link</span>
        </button>

        <div id="message" class="message"></div>
    </form>

    <div class="back-link">
        <a href="{% url 'login_page' %}">← Back to Login</a>
    </div>

    <div class="contact-admin">
        Don't have an account? <strong>Contact your administrator</strong> to get access.
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
const form = document.getElementById("resetForm");
const emailInput = document.getElementById("email");
const messageDiv = document.getElementById("message");
const resetBtn = document.getElementById("resetBtn");
const btnText = document.getElementById("btnText");

function getCSRFToken() {
    return document.cookie
        .split("; ")
        .find(row => row.startsWith("csrftoken="))
        ?.split("=")[1];
}

function showLoading() {
    resetBtn.disabled = true;
    btnText.innerHTML = '<span class="loading-text"><span class="spinner"></span>Sending...</span>';
}

function hideLoading() {
    resetBtn.disabled = false;
    btnText.innerHTML = 'Send Reset Link';
}

function showMessage(message, type = "error") {
    messageDiv.innerHTML = message;
    messageDiv.className = `message show ${type}`;
    
    setTimeout(() => {
        messageDiv.classList.remove("show");
    }, 5000);
}

function clearMessage() {
    messageDiv.classList.remove("show");
}

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = emailInput.value.trim();

    if (!email) {
        showMessage("Email is required", "error");
        emailInput.focus();
        return;
    }

    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showMessage("Please enter a valid email address", "error");
        emailInput.focus();
        return;
    }

    clearMessage();
    showLoading();

    // First check if email exists in your system
    $.ajax({
        url: "/user/check-email-exists/",
        method: "POST",
        contentType: "application/json",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        data: JSON.stringify({ email: email }),
        success: function(data) {
            if (data.exists) {
                // Email exists - submit the form to Django's password reset
                $.ajax({
                    url: "{% url 'reset_password' %}",
                    method: "POST",
                    data: form.serialize(),
                    headers: {
                        "X-CSRFToken": getCSRFToken()
                    },
                    success: function(response) {
                        hideLoading();
                        showMessage("✅ Password reset link sent to your email! Redirecting...", "success");
                        setTimeout(() => {
                            window.location.href = "{% url 'password_reset_done' %}";
                        }, 1500);
                    },
                    error: function(xhr) {
                        hideLoading();
                        showMessage("Something went wrong. Please try again.", "error");
                    }
                });
            } else {
                // Email doesn't exist - show error message
                hideLoading();
                showMessage(
                    '❌ No account found with this email. Please contact your administrator.', 
                    "error"
                );
            }
        },
        error: function(xhr) {
            hideLoading();
            const error = xhr.responseJSON?.error || "Server error. Please try again later.";
            showMessage(error, "error");
        }
    });
});

emailInput.addEventListener("input", clearMessage);

emailInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        form.dispatchEvent(new Event("submit"));
    }
});
</script>

</body>
</html>
